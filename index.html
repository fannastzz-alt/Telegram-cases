<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор Кейсов</title>
    <!-- Подключаем официальный скрипт Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            margin-top: 50px;
        }
        .roulette-container {
            width: 80%;
            max-width: 400px;
            height: 60px;
            border: 2px solid #ffaa00;
            margin: 20px auto;
            overflow: hidden;
            position: relative;
            background: #2b2b2b;
            border-radius: 8px;
        }
        .line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: red;
            z-index: 10;
        }
        .tape {
            display: flex;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        .item {
            min-width: 100px;
            max-width: 100px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            border-right: 1px solid #333;
            background: #3a3a3a;
        }
        button {
            background: #ffaa00;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 170, 0, 0.4);
        }
        button:disabled {
            background: #555;
            color: #aaa;
            box-shadow: none;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #ffaa00;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📦 Открытие кейса "Желание"</h2>
        <p id="welcome">Загрузка игрока...</p>

        <div class="roulette-container">
            <div class="line"></div>
            <div id="tape" class="tape"></div>
        </div>

        <button id="spin-btn" onclick="spinCase()">Испытать удачу</button>
        <div id="result"></div>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        // Показываем имя игрока
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('welcome').innerText = `Привет, ${tg.initDataUnsafe.user.first_name}!`;
        } else {
            document.getElementById('welcome').innerText = `Привет, Тестер!`;
        }

        const items = ['💍 Ring', '🐸 Frog', '🔑 Strike', '🎃 Pumpkin', '🌹 Rose', '🦜 Bird'];
        const tape = document.getElementById('tape');
        const spinBtn = document.getElementById('spin-btn');
        const resultDiv = document.getElementById('result');

        // Генерируем ленту предметов для крутилки
        function generateTape() {
            tape.innerHTML = '';
            // Создаем 40 случайных предметов для эффекта прокрутки
            for (let i = 0; i < 40; i++) {
                const randomItem = items[Math.floor(Math.random() * items.length)];
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                itemDiv.innerText = randomItem;
                tape.appendChild(itemDiv);
            }
        }

        function spinCase() {
            spinBtn.disabled = true;
            resultDiv.innerText = '';
            generateTape();

            // Сбрасываем позицию ленты
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0px)';

            // Даем браузеру обновиться и запускаем анимацию
            setTimeout(() => {
                const itemWidth = 101; // Ширина предмета + border
                const winIndex = 28; // 28-й предмет окажется по центру в конце
                const winItem = items[Math.floor(Math.random() * items.length)];
                
                // Подменяем выигрышный предмет на ленте
                tape.children[winIndex].innerText = winItem;
                tape.children[winIndex].style.background = '#ffaa00';
                tape.children[winIndex].style.color = 'black';

                // Считаем сдвиг, чтобы предмет встал ровно по центру красной линии
                const containerWidth = document.querySelector('.roulette-container').offsetWidth;
                const offset = -(winIndex * itemWidth) + (containerWidth / 2) - (itemWidth / 2);

                tape.style.transition = 'transform 4s cubic-bezier(0.1, 0.8, 0.1, 1)';
                tape.style.transform = `translateX(${offset}px)`;

                // Выводим результат после окончания кручения
                setTimeout(() => {
                    resultDiv.innerText = `🎉 Вы выбили: ${winItem}!`;
                    spinBtn.disabled = false;
                    tg.HapticFeedback.notificationOccurred('success'); // Вибрация на телефоне!
                }, 4000);
            }, 50);
        }

        // Первичная генерация при старте
        generateTape();
    </script>
</body>
</html>
