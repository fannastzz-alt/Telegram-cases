<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Симулятор Кейсов Telegram</title>
    <!-- Подключаем официальный cdn Supabase SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <!-- Подключаем Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Хедер профиля */
        .profile-header {
            width: 90%;
            max-width: 400px;
            background-color: #2c2c2e;
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .username {
            font-weight: bold;
            font-size: 16px;
        }
        .balance-badge {
            background-color: #3a3a3c;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            color: #ffd60a;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #ffd60a;
        }

        /* Экраны страниц */
        .page {
            display: none;
            width: 100%;
            max-width: 400px;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px;
        }
        .page.active {
            display: flex;
        }

        /* Карточка кейса */
        .case-card {
            width: 90%;
            background-color: #2c2c2e;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .case-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .case-price {
            color: #ffd60a;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Окно рулетки */
        .roulette-wrapper {
            width: 100%;
            overflow: hidden;
            position: relative;
            background-color: #121214;
            height: 120px;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid #3a3a3c;
        }
        .roulette-line {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background-color: #ff453a;
            z-index: 10;
            box-shadow: 0 0 8px #ff453a;
        }
        .roulette-track {
            display: flex;
            position: absolute;
            left: 0;
            top: 10px;
            height: 100px;
            will-change: transform;
        }
        .item-card {
            width: 90px;
            height: 100px;
            background-color: #1c1c1e;
            margin: 0 2px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
        }
        .item-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-bottom: 5px;
        }

        /* Кнопка */
        .btn-spin {
            width: 100%;
            background-color: #30d158;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-spin:disabled {
            background-color: #3a3a3c;
            color: #8e8e93;
        }

        /* Блок награды */
        .reward-block {
            display: none;
            margin-top: 15px;
            background-color: #2c2c2e;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid transparent;
        }
        .reward-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-reward {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-claim { background-color: #0a84ff; color: white; }
        .btn-sell { background-color: #ff453a; color: white; }

        /* Сетка Инвентаря */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 90%;
            margin-top: 20px;
            box-sizing: border-box;
        }
        .inventory-item {
            background-color: #2c2c2e;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
        }
        .inventory-item img {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }
        .empty-text {
            grid-column: span 3;
            text-align: center;
            color: #8e8e93;
            margin-top: 40px;
        }

        /* Нижнее меню навигации */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #121214;
            border-top: 1px solid #2c2c2e;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e8e93;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-item.active {
            color: #0a84ff;
        }
        .nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <!-- Шапка аккаунта -->
    <div class="profile-header">
        <div class="username" id="username">Загрузка...</div>
        <div class="balance-badge">
            🪙 <span id="balance-display">0</span>
        </div>
    </div>

    <!-- СТРАНИЦА: КЕЙСЫ -->
    <div class="page active" id="screen-cases">
        <div class="case-card">
            <div class="case-title">Кейс "Желание"</div>
            <div class="case-price">Стоимость: 150 🪙</div>
            
            <div class="roulette-wrapper">
                <div class="roulette-line"></div>
                <div class="roulette-track" id="roulette-track"></div>
            </div>

            <button class="btn-spin" id="spin-button" onclick="startSpin()">Испытать удачу</button>

            <!-- Окно выигрыша -->
            <div class="reward-block" id="reward-block">
                <h3 style="margin-top:0; margin-bottom:10px;">Вы выиграли!</h3>
                <div id="reward-card" style="background:#1c1c1e; padding:10px; border-radius:8px; display:inline-block; border-bottom:4px solid transparent;">
                    <img id="reward-image" src="" style="width:50px; height:50px; object-fit:contain;"><br>
                    <span id="reward-name" style="font-weight:bold; font-size:14px;">Предмет</span>
                </div>
                <div class="reward-buttons">
                    <button class="btn-reward btn-claim" onclick="claimItem()">Оставить</button>
                    <button class="btn-reward btn-sell" onclick="sellItem()"><span id="sell-button-text">Продать</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- СТРАНИЦА: ИНВЕНТАРЬ -->
    <div class="page" id="screen-inventory">
        <h2 style="width:90%; margin-top:20px; margin-bottom:5px;">Мой инвентарь</h2>
        <span style="width:90%; color:#8e8e93; font-size:12px; margin-bottom:10px;">Нажмите на предмет, чтобы продать его</span>
        <div class="inventory-grid" id="inventory-container"></div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <div class="nav-bar">
        <div class="nav-item active" id="nav-btn-cases" onclick="switchPage('cases')">
            <div class="nav-icon">📦</div>
            <div>Кейсы</div>
        </div>
        <div class="nav-item" id="nav-btn-inventory" onclick="switchPage('inventory')">
            <div class="nav-icon">🎒</div>
            <div>Инвентарь</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Исправленная инициализация через встроенный конструктор UMD
        const SUPABASE_URL = "https://nfqishqrigetyvnymzss.supabase.co";
        const SUPABASE_KEY = "Sb_publishable_9y2KDUKbDFpRnnGKJA-udg_gZvu7fQk";
        
        // Создаем подключение строго по правилам v2 библиотеки
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userId = "demo_user"; 
        let firstName = "Игрок";

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id.toString();
            firstName = tg.initDataUnsafe.user.first_name;
        }
        document.getElementById('username').innerText = firstName;

        let balance = 1000;
        let localInventory = []; 
        const spinCost = 150;
        let lastWonItem = null;

        const pool = [
            ["Froggy", "frog.png", 50, "#30d158"],
            ["Froggy", "frog.png", 50, "#30d158"],
            ["Rose", "rose.png", 100, "#0a84ff"],
            ["Rose", "rose.png", 100, "#0a84ff"],
            ["Birdy", "bird.png", 120, "#bf5af2"],
            ["Strike Key", "key.png", 300, "#ffd60a"],
            ["Diamond", "diamond.png", 800, "#ff9f0a"]
        ];

        const track = document.getElementById('roulette-track');
        const spinBtn = document.getElementById('spin-button');
        const rewardBlock = document.getElementById('reward-block');
        const balanceDisplay = document.getElementById('balance-display');
        const inventoryContainer = document.getElementById('inventory-container');
        const cardWidth = 94;

        // Загрузка или создание профиля игрока
        async function loadUserData() {
            try {
                let { data: user, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .maybeSingle();

                if (!user) {
                    const { data: newUser, error: insertError } = await supabase
                        .from('users')
                        .insert([{ id: userId, username: firstName, balance: 1000, inventory: [] }])
                        .select()
                        .maybeSingle();
                    user = newUser;
                }

                if (user) {
                    balance = user.balance;
                    localInventory = user.inventory || [];
                    balanceDisplay.innerText = balance;
                }
            } catch (err) {
                console.error("Ошибка загрузки данных:", err);
            }
        }

        // Сохранение баланса и инвентаря
        async function saveUserData() {
            try {
                await supabase
                    .from('users')
                    .update({ balance: balance, inventory: localInventory })
                    .eq('id', userId);
                balanceDisplay.innerText = balance;
            } catch (err) {
                console.error("Ошибка сохранения данных:", err);
            }
        }

        function switchPage(page) {
            document.getElementById('screen-cases').classList.remove('active');
            document.getElementById('screen-inventory').classList.remove('active');
            document.getElementById('nav-btn-cases').classList.remove('active');
            document.getElementById('nav-btn-inventory').classList.remove('active');

            if (page === 'cases') {
                document.getElementById('screen-cases').classList.add('active');
                document.getElementById('nav-btn-cases').classList.add('active');
            } else if (page === 'inventory') {
                document.getElementById('screen-inventory').classList.add('active');
                document.getElementById('nav-btn-inventory').classList.add('active');
                renderInventory();
            }
        }

        function renderInventory() {
            inventoryContainer.innerHTML = '';
            if (localInventory.length === 0) {
                inventoryContainer.innerHTML = '<div class="empty-text">Тут пока пусто...</div>';
                return;
            }

            localInventory.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'inventory-item';
                card.style.borderBottom = `4px solid ${item.color}`;
                card.innerHTML = `
                    <img src="${item.img}">
                    <span style="margin-top:5px;">${item.name}</span>
                    <span style="color:#ffd60a;">${item.price} 🪙</span>
                `;
                card.onclick = async () => {
                    if (confirm(`Продать ${item.name} за ${item.price} 🪙?`)) {
                        balance += item.price;
                        localInventory = localInventory.filter(i => i.id !== item.id);
                        await saveUserData();
                        renderInventory();
                    }
                };
                inventoryContainer.appendChild(card);
            });
        }

        function setupRoulette() {
            track.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                const randomItem = pool[Math.floor(Math.random() * pool.length)];
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.borderBottom = `4px solid ${randomItem[3]}`;
                card.innerHTML = `
                    <img class="item-img" src="${randomItem[1]}">
                    <span>${randomItem[0]}</span>
                `;
                track.appendChild(card);
            }
        }

        function startSpin() {
            if (balance < spinCost) {
                alert("Недостаточно монет!");
                return;
            }
            balance -= spinCost;
            saveUserData();
            
            spinBtn.disabled = true;
            rewardBlock.style.display = 'none';

            track.style.transition = 'none';
            track.style.transform = 'translateX(0px)';
            setupRoulette();

            setTimeout(() => {
                const winIndex = 35;
                const winItem = pool[Math.floor(Math.random() * pool.length)];
                lastWonItem = winItem;

                const cards = track.getElementsByClassName('item-card');
                cards[winIndex].style.borderBottom = `4px solid ${winItem[3]}`;
                cards[winIndex].innerHTML = `
                    <img class="item-img" src="${winItem[1]}">
                    <span>${winItem[0]}</span>
                `;

                const wrapperWidth = document.querySelector('.roulette-wrapper').clientWidth;
                const centerOffset = (wrapperWidth / 2) - (cardWidth / 2);
                const targetX = -(winIndex * cardWidth) + centerOffset;

                track.style.transition = 'transform 4s cubic-bezier(0.1, 0.6, 0.1, 1)';
                track.style.transform = `translateX(${targetX}px)`;

                setTimeout(() => {
                    document.getElementById('reward-image').src = winItem[1];
                    document.getElementById('reward-name').innerText = winItem[0];
                    document.getElementById('reward-card').style.borderColor = winItem[3];
                    document.getElementById('sell-button-text').innerText = `Продать за ${winItem[2]} 🪙`;
                    rewardBlock.style.display = 'block';
                    spinBtn.disabled = false;
                }, 4100);
            }, 50);
        }

        async function claimItem() {
            if (!lastWonItem) return;
            localInventory.push({
                id: Date.now().toString(),
                name: lastWonItem[0],
                img: lastWonItem[1],
                price: lastWonItem[2],
                color: lastWonItem[3]
            });
            await saveUserData();
            alert("Предмет успешно добавлен в инвентарь!");
            rewardBlock.style.display = 'none';
            lastWonItem = null;
        }

        async function sellItem() {
            if (!lastWonItem) return;
            balance += lastWonItem[2];
            await saveUserData();
            rewardBlock.style.display = 'none';
            lastWonItem = null;
        }

        // Запуск
        loadUserData().then(() => {
            setupRoulette();
        });
    </script>
</body>
</html>
