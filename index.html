<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Stars Case Opener</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 12px;
            overflow-x: hidden;
            user-select: none;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        .header {
            background: #1e293b;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            text-align: center;
        }
        #username-display { font-size: 0.95rem; color: #94a3b8; font-weight: 500; }
        .balance { color: #eab308; font-weight: bold; font-size: 1.3rem; margin-top: 4px; }

        h2 { font-size: 1.25rem; margin: 12px 0; color: #f1f5f9; text-align: center; }

        /* Сетка выбора кейсов (Адаптивная под экраны телефонов) */
        .case-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .case-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 14px 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 105px;
            text-align: center;
        }
        .case-card h3 {
            font-size: 0.85rem;
            margin: 0 0 6px 0;
            line-height: 1.2;
            word-wrap: break-word;
        }
        .case-cost {
            color: #38bdf8;
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* Кнопки управления */
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn:disabled { background: #475569; color: #94a3b8; }
        .btn-secondary { background: #334155; width: auto; padding: 6px 14px; font-size: 0.85rem; margin: 0; float: left; }

        /* НАСТОЯЩАЯ ГОРИЗОНТАЛЬНАЯ РУЛЕТКА */
        .roulette-container {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 14px;
            margin: 15px 0;
            position: relative;
            overflow: hidden;
            height: 95px;
            display: flex;
            align-items: center;
        }
        /* Центральный маркер выигрыша */
        .roulette-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #eab308;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 8px #eab308;
        }
        .roulette-track {
            display: flex;
            position: absolute;
            left: 0;
            transition: transform 0s cubic-bezier(0.1, 0.6, 0.1, 1);
            will-change: transform;
        }
        .roulette-item {
            width: 80px;
            height: 75px;
            background: #111827;
            border: 1px solid #334155;
            margin: 0 3px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            padding: 4px;
            text-align: center;
            flex-shrink: 0;
        }
        .roulette-item .icon { font-size: 1.6rem; margin-bottom: 2px; }
        .roulette-item .name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Список предметов под кейсом */
        .loot-info-section {
            margin-top: 20px;
            text-align: left;
        }
        .loot-list {
            background: #1e293b;
            border-radius: 14px;
            padding: 8px;
            border: 1px solid #334155;
        }
        .loot-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #334155;
            font-size: 0.85rem;
        }
        .loot-item-row:last-child { border-bottom: none; }
        .loot-name { font-weight: 500; display: flex; align-items: center; gap: 4px;}
        .loot-details { text-align: right; }
        .loot-chance { color: #4ade80; font-weight: bold; font-size: 0.8rem; }
        .loot-price { color: #94a3b8; font-size: 0.75rem; }

        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>

    function formatStars(num) {
        if (!num) return "0";
        let absNum = Math.abs(num);
        if (absNum >= 1e12) return (num / 1e12).toFixed(1) + "Т";
        if (absNum >= 1e9) return (num / 1e9).toFixed(1) + "Б";
        if (absNum >= 1e6) return (num / 1e6).toFixed(1) + "М";
        if (absNum >= 1e3) return (num / 1e3).toFixed(1) + "к";
        return num.toString();
    }

    async function loadUserData() {
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            const tgData = window.Telegram.WebApp.initDataUnsafe;
            if (tgData && tgData.user) {
                userId = tgData.user.id.toString();
                username = tgData.user.username || tgData.user.first_name || "Gamer";
            }
        }
        document.getElementById("username-display").innerText = "@" + username;

        try {
            let { data, error } = await supabase.from('users').select('*').eq('id', userId).maybeSingle();
            if (error) throw error;

            if (!data) {
                const newUser = { id: userId, username: username, balance: 5000, inventory: {} };
                await supabase.from('users').insert([newUser]);
                userBalance = 5000;
                userInventory = {};
            } else {
                userBalance = data.balance || 0;
                userInventory = data.inventory || {};
            }
            updateUI();
            renderMenu();
        } catch (e) {
            document.getElementById("username-display").innerText = "Ошибка БД";
        }
    }

    function updateUI() {
        document.getElementById("balance-value").innerText = formatStars(userBalance);
    }

    function renderMenu() {
        const container = document.getElementById("case-grid-container");
        container.innerHTML = "";
        Object.keys(CASE_CONFIG).forEach(key => {
            const caseInfo = CASE_CONFIG[key];
            const card = document.createElement("div");
            card.className = "case-card";
            card.innerHTML = `
                <h3>${caseInfo.name}</h3>
                <div class="case-cost">${caseInfo.cost > 0 ? formatStars(caseInfo.cost) + " ⭐" : "Бесплатно"}</div>
            `;
            card.onclick = () => openCaseScreen(key);
            container.appendChild(card);
        });
    }

    function openCaseScreen(key) {
        if(isRolling) return;
        selectedCaseKey = key;
        const caseInfo = CASE_CONFIG[key];
        
        document.getElementById("menu-screen").style.display = "none";
        document.getElementById("opening-screen").style.display = "block";
        document.getElementById("current-case-name").innerText = caseInfo.name;
        document.getElementById("open-btn").disabled = false;
        document.getElementById("open-btn").innerText = `Открыть за ${formatStars(caseInfo.cost)} ⭐`;

        generateLootList(caseInfo.items);
        resetRoulette(caseInfo.items);
    }

    function backToMenu() {
        if(isRolling) return;
        document.getElementById("menu-screen").style.display = "block";

        selectedCaseKey = null;
    }

            const row = document.createElement("div");
            row.className = "loot-item-row";
            row.innerHTML = `
                <div class="loot-name">${name}</div>
                <div class="loot-details">
                    <div class="loot-chance">${chance}%</div>
                    <div class="loot-price">${formatStars(price)} ⭐</div>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function resetRoulette(itemsArray) {
        const track = document.getElementById("roulette-track");
        track.style.transition = "none";
        track.style.transform = "translateX(0px)";
        track.innerHTML = "";

        for (let i = 0; i < 35; i++) {
            const randomName = itemsArray[Math.floor(Math.random() * itemsArray.length)][0];
            track.appendChild(createItemNode(randomName));
        }
    }

    function createItemNode(fullName) {
        const node = document.createElement("div");
        node.className = "roulette-item";
        
        const emojiMatch = fullName.match(/[\u{1F300}-\u{1F9FF}\u{2700}-\u{27BF}]+/u);
        const emoji = emojiMatch ? emojiMatch[0] : "📦";
        const cleanName = fullName.replace(emoji, "").trim();

        node.innerHTML = `
            <div class="icon">${emoji}</div>
            <div class="name">${cleanName}</div>
        `;
        return node;
    }

    function getRandomItem(itemsArray) {
        let totalWeight = itemsArray.reduce((sum, item) => sum + item[1], 0);
        let randomNum = Math.random() * totalWeight;
        for (let i = 0; i < itemsArray.length; i++) {
            if (randomNum < itemsArray[i][1]) return itemsArray[i][0];
            randomNum -= itemsArray[i][1];
        }
        return itemsArray[0][0];
    }

    async function triggerOpenCase() {
        if (isRolling || !selectedCaseKey) return;
        const caseInfo = CASE_CONFIG[selectedCaseKey];

        if (userBalance < caseInfo.cost) {
            alert("Недостаточно звёзд!");
            return;
        }

        isRolling = true;
        document.getElementById("open-btn").disabled = true;

        const winningItem = getRandomItem(caseInfo.items);

        userBalance -= caseInfo.cost;
        userInventory[winningItem] = (userInventory[winningItem] || 0) + 1;
        updateUI();

        const { error } = await supabase.from('users').update({ balance: userBalance, inventory: userInventory }).eq('id', userId);
        if (error) {
            alert("Ошибка соединения с БД!");
            isRolling = false;
            document.getElementById("open-btn").disabled = false;
            return;
        }

        const track = document.getElementById("roulette-track");
        const itemsNodes = track.children;
        
        for(let i=0; i<35; i++) {
            if(i === 28) {
                track.replaceChild(createItemNode(winningItem), itemsNodes[i]);
            } else {
                const randName = caseInfo.items[Math.floor(Math.random() * caseInfo.items.length)][0];
                track.replaceChild(createItemNode(randName), itemsNodes[i]);
            }
        }

        const itemWidth = 86; 
        const containerWidth = document.querySelector('.roulette-container').offsetWidth;
        const centerOffset = (containerWidth / 2) - (itemWidth / 2);
        const finalX = -(28 * itemWidth) + centerOffset;

        track.style.transition = "transform 4s cubic-bezier(0.15, 0.85, 0.15, 1)";
        track.style.transform = `translateX(${finalX}px)`;

        setTimeout(() => {
            isRolling = false;
            document.getElementById("open-btn").disabled = false;
        }, 4200);
    }

    window.addEventListener('DOMContentLoaded', loadUserData);
</script>
</body>
</html>
