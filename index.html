<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Кейс-Бот</title>
    <!-- Подключаем библиотеку Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        #cases-container { display: flex; flex-direction: column; gap: 15px; padding: 20px; }
        .case-card { border: 1px solid #444; border-radius: 12px; padding: 20px; background: #2d2d2d; }
        .error { color: #ff6b6b; padding: 20px; }
    </style>
</head>
<body>

    <h1>Кейсы</h1>
    <div id="cases-container">Загрузка данных из базы...</div>

    <script>
        // --- ВСТАВЬ СЮДА СВОИ ДАННЫЕ (НЕ УДАЛЯЙ КАВЫЧКИ!) ---
        const SUPABASE_URL = 'ТВОЙ_URL_ЗДЕСЬ';
        const SUPABASE_KEY = 'ТВОЙ_KEY_ЗДЕСЬ';
        // ---------------------------------------------------

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadCases() {
            const container = document.getElementById('cases-container');
            
            try {
                // Запрос к таблице
                const { data, error } = await supabase.from('cases').select('*');
                
                if (error) throw error;
                
                container.innerHTML = ''; // Очищаем "Загрузка..."
                
                data.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'case-card';
                    card.innerHTML = `
                        <h3>${c.name}</h3>
                        <p>Стоимость: ${c.cost} 💰</p>
                        <button onclick="alert('Открытие кейса ${c.id} в разработке!')">Открыть кейс</button>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = `<div class="error">Ошибка: ${err.message}</div>`;
                console.error("Ошибка при работе с Supabase:", err);
            }
        }

        // Запуск функции
        loadCases();
    </script>
</body>
</html>
