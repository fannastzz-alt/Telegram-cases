<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Cases Bot</title>
    
    <!-- 1. Подключение Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. Подключение Telegram (ДОБАВЬ ЭТУ СТРОКУ): -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: #0e1621;
            --surface-color: #17212b;
            --text-color: #ffffff;
            --text-muted: #6c7883;
            --accent-color: #2481cc;
            --accent-hover: #2a96e8;
            --success-color: #31b545;
            --star-color: #f4b400;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            user-select: none;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            background-color: var(--bg-color);
        }

        header {
            background-color: var(--surface-color);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #101921;
            z-index: 10;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a96e8, #2481cc);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
        }

        .balance-display {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: rgba(244, 180, 0, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(244, 180, 0, 0.2);
            font-weight: 600;
            color: var(--star-color);
        }

        .star-icon {
            color: var(--star-color);
            font-size: 16px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px; 
            position: relative;
        }

        .tab-content {
            display: none;
            padding: 16px;
        }

        .tab-content.active {
            display: block;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .case-card {
    background-color: var(--surface-color);
    border-radius: var(--border-radius);
    padding: 12px;   /* Уменьшили padding, чтобы освободить место для картинки */
    height: 240px;   /* ЗАДАДИМ ФИКСИРОВАННУЮ ВЫСОТУ ДЛЯ КАРТОЧКИ */
    box-sizing: border-box; /* Это чтобы padding не увеличивал карточку сверх высоты */
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    justify-content: space-between; /* ЭТО ОЧЕНЬ ВАЖНО: прижмет картинку вверх, а цену вниз */
    border: 1px solid rgba(255, 255, 255, 0.05);
    transition: transform 0.1s;
}

        .case-card:active {
            transform: scale(0.98);
        }

        .case-image {
    width: 85%;       /* Картинка растянется почти на всю ширину карточки */
    height: 120px;    /* Задаем фиксированную высоту побольше */
    object-fit: contain; /* Картинка будет вписываться целиком без искажений */
    margin-bottom: 8px; /* Добавим небольшой отступ до названия */
}

        .case-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .case-price {
            font-size: 13px;
            color: var(--star-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .case-price.free {
            color: var(--success-color);
        }

        #roulette-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-color);
            z-index: 20;
            padding: 16px;
            flex-direction: column;
            align-items: center;
        }

        .back-button {
            align-self: flex-start;
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .roulette-case-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 360px;
            height: 110px;
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 16px;
        }

        .roulette-marker {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 4px;
            background-color: var(--star-color);
            box-shadow: 0 0 10px var(--star-color);
            transform: translateX(-50%);
            z-index: 5;
        }

        .roulette-track {
            display: flex;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            will-change: transform;
        }

        .roulette-item {
            width: 100px;
            height: 100%;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-right: 1px solid rgba(255,255,255,0.03);
            text-align: center;
            background-color: #192430;
        }

        .roulette-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-bottom: 4px;
        }

        .roulette-item .item-name {
            font-size: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            color: #d1d5db;
        }

        .action-button {
            width: 100%;
            max-width: 280px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(36, 129, 204, 0.2);
            transition: background-color 0.1s;
            margin-bottom: 20px;
        }

        .action-button:active {
            background-color: var(--accent-hover);
        }

        .action-button:disabled {
            background-color: var(--text-muted);
            box-shadow: none;
            opacity: 0.6;
        }

        .case-odds-container {
            width: 100%;
            max-width: 360px;
            flex: 1;
            overflow-y: auto;
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
        }

        .odds-header {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 6px;
        }

        .odds-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 13px;
        }

        .odds-item-row:last-child {
            border-bottom: none;
        }

        .odds-left-side {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .odds-item-thumb {
            width: 28px;
            height: 28px;
            object-fit: contain;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .odds-item-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .odds-right-side {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .odds-item-value {
            color: var(--star-color);
            font-weight: 600;
            font-size: 12px;
        }

        .odds-item-percent {
            color: var(--success-color);
            font-weight: 700;
            font-size: 12px;
            min-width: 50px;
            text-align: right;
        }

        #win-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .win-content {
            background-color: var(--surface-color);
            width: 100%;
            max-width: 320px;
            border-radius: var(--border-radius);
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .win-label {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .win-image {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin: 16px 0;
        }

        .win-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .win-price {
            color: var(--star-color);
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .inventory-stats {
            font-size: 14px;
            color: var(--text-muted);
        }

        .sell-all-btn {
            background-color: rgba(235, 87, 87, 0.1);
            color: #eb5757;
            border: 1px solid rgba(235, 87, 87, 0.2);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .inventory-item-card {
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .item-count-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background-color: var(--accent-color);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .inventory-item-img {
            width: 55px;
            height: 55px;
            object-fit: contain;
            margin-bottom: 6px;
        }

        .inventory-item-name {
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .inventory-item-price {
            font-size: 11px;
            color: var(--star-color);
            font-weight: 600;
        }

        .empty-state {
            grid-column: span 3;
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .profile-container {
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a96e8, #2481cc);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
        }

        /* Общий стиль для кнопки закрепления в инвентаре */
.pin-btn {
    margin-top: 8px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    background-color: rgba(255, 255, 255, 0.08);
    color: #fff;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
    width: 90%;
}

.pin-btn:active {
    transform: scale(0.95);
}

/* Стиль кнопки, когда предмет уже ЗАКРЕПЛЕН */
.pin-btn.pinned {
    background-color: #2f80ed; /* Красивый синий цвет Telegram */
    box-shadow: 0 0 8px rgba(47, 128, 237, 0.4);
}

        .profile-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .stats-list {
            text-align: left;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 16px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .stats-label {
            color: var(--text-muted);
        }

        .stats-value {
            font-weight: 600;
        }

        #bottom-tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background-color: var(--surface-color);
            border-top: 1px solid #101921;
            display: flex;
            z-index: 15;
        }

        .tab-button {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
        }

        .tab-button.active {
            color: var(--accent-color);
        }

        .tab-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="user-badge">
            <div class="user-avatar" id="header-avatar">U</div>
            <div class="user-name username-container">
    <span id="header-username">Загрузка...</span>
    <img id="header-pinned-badge" src="" alt="" style="display: none;" />
</div>
        </div>
        <div class="balance-display">
            <span class="star-icon">⭐</span>
            <span id="balance-value">0</span>
        </div>
    </header>

    <div class="content-area">
        <div id="cases-tab" class="tab-content active">
            <div class="cases-grid" id="cases-list-container"></div>
        </div>

        <div id="inventory-tab" class="tab-content">
            <div class="inventory-header">
                <div class="inventory-stats" id="inv-count-label">Предметов: 0</div>
                <button class="sell-all-btn" onclick="sellAllItems()">Продать всё</button>
            </div>
            <div class="inventory-grid" id="inventory-items-container"></div>
        </div>

        <div id="profile-tab" class="tab-content">
            <div class="profile-container">
                <div class="profile-avatar" id="prof-avatar">U</div>
                <div class="profile-name username-container">
    <span id="prof-username">Загрузка...</span>
    <img id="profile-pinned-badge" class="pinned-badge-style" src="" alt="" style="display: none;" />
</div>
                <div class="stats-list">
                    <div class="stats-row">
                        <span class="stats-label">Всего открыто кейсов:</span>
                        <span class="stats-value" id="stat-cases-opened">0</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">Заработано на продаже:</span>
                        <span class="stats-value" id="stat-total-earned" style="color:var(--star-color)">⭐ 0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="roulette-screen">
        <button class="back-button" onclick="closeRouletteScreen()">← Назад к кейсам</button>
        <div class="roulette-case-title" id="active-case-title">📦 Бесплатный кейс</div>
        
        <div class="roulette-wrapper">
            <div class="roulette-marker"></div>
            <div class="roulette-track" id="wheel-track"></div>
        </div>

        <button class="action-button" id="roll-button" onclick="startCaseRoll()">Открыть кейс</button>

        <div class="case-odds-container">
            <div class="odds-header">Содержимое и шансы выпадения:</div>
            <div id="odds-items-list"></div>
        </div>
    </div>

    <div id="bottom-tab-bar">
        <button class="tab-button active" onclick="switchTab('cases-tab')">
            <span class="tab-icon">📦</span><span>Кейсы</span>
        </button>
        <button class="tab-button" onclick="switchTab('inventory-tab')">
            <span class="tab-icon">🎒</span><span>Инвентарь</span>
        </button>
        <button class="tab-button" onclick="switchTab('profile-tab')">
            <span class="tab-icon">👤</span><span>Профиль</span>
        </button>
    </div>
</div>

<div id="win-modal">
    <div class="win-content">
        <div class="win-label">Вы получили</div>
        <img src="" alt="" class="win-image" id="win-item-image">
        <div class="win-title" id="win-item-name">Предмет</div>
        <div class="win-price">⭐ <span id="win-item-price">0</span></div>
        <button class="action-button" onclick="closeWinModal()">Забрать</button>
    </div>
</div>

    // Вспомогательные утилиты
    function formatStars(num) {
        if (!num && num !== 0) return "0";
        let absNum = Math.abs(num);
        if (absNum >= 1e12) return (num / 1e12).toFixed(1) + "Т";
        if (absNum >= 1e9) return (num / 1e9).toFixed(1) + "Б";
        if (absNum >= 1e6) return (num / 1e6).toFixed(1) + "М";
        if (absNum >= 1e3) return (num / 1e3).toFixed(1) + "к";
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    async function initUserAndDB() {
        // Проверяем Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                tgUser.id = tg.initDataUnsafe.user.id.toString();
                tgUser.username = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || "User";
            }
        }

        // Если нет TG, но мы тестируем в обычном браузере — создаем UUID
        if (tgUser.id === "test_user_id") {
            let localId = localStorage.getItem('local_id');
            if(!localId) {
                localId = 'usr_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('local_id', localId);
            }
            tgUser.id = localId;
            tgUser.username = "Игрок_" + localId.slice(4, 8);
        }

        // Выводим имя на экран
        document.getElementById('header-username').textContent = tgUser.username;
        document.getElementById('prof-username').textContent = tgUser.username;
        document.getElementById('header-avatar').textContent = tgUser.username[0].toUpperCase();
        document.getElementById('prof-avatar').textContent = tgUser.username[0].toUpperCase();

        if (supabase) {
            await loadUserDataFromSupabase();
        } else {
            // Если Supabase не подключен, берем данные из LocalStorage браузера
            loadLocalBackup();
        }
    }

    async function loadUserDataFromSupabase() {
        try {
            const { data, error } = await supabaseClient
    .from('users')
    .select('*')
    .eq('id', tgUser.id)
    .single();
            if (error && error.code === 'PGRST116') {
                // Пользователь не найден, создаем новую запись в БД
                await createNewUserInSupabase();
            } else if (data) {
                userBalance = data.balance || 0;
                inventory = data.inventory || {};
                statsCasesOpened = data.cases_opened || 0;
                statsTotalEarned = data.total_earned || 0;
            }
        } catch(e) {
            console.error("Ошибка при работе с Supabase, берем локальные данные:", e);
            loadLocalBackup();
        }
        updateBalanceDisplay();
    }

    async function createNewUserInSupabase() {
        const newUser = {
            id: tgUser.id,
            username: tgUser.username,
            balance: 0, // 0 звезд на старте
            inventory: {},
            cases_opened: 0,
            total_earned: 0
        };
        await supabaseClient.from('users').insert([newUser]);
    }

    async function saveUserData() {
        // Сначала всегда дублируем в локальное хранилище для надежности
        localStorage.setItem(`save_${tgUser.id}`, JSON.stringify({
            balance: userBalance,
            inventory: inventory,
            cases_opened: statsCasesOpened,
            total_earned: statsTotalEarned
        }));

        if (supabaseClient) {
        try {
            await supabaseClient
                .from('users')
                .update({
                    balance: userBalance,
                    inventory: inventory,
                    cases_opened: statsCasesOpened,
                    total_earned: statsTotalEarned
                })
                .eq('id', tgUser.id);

        } catch(e) {
            console.error("Не удалось отправить сейв в Supabase:", e);
        }
    }
}

    function loadLocalBackup() {
        const backup = localStorage.getItem(`save_${tgUser.id}`);
        if(backup) {
            const parsed = JSON.parse(backup);
            userBalance = parsed.balance || 0;
            inventory = parsed.inventory || {};
            statsCasesOpened = parsed.cases_opened || 0;
            statsTotalEarned = parsed.total_earned || 0;
        } else {
            // Совсем пустой старт
            userBalance = 0;
            inventory = {};
            statsCasesOpened = 0;
            statsTotalEarned = 0;
        }

    function renderCases() {
        const container = document.getElementById('cases-list-container');
        container.innerHTML = '';

        for (let key in CASE_CONFIG) {
            const item = CASE_CONFIG[key];
            const card = document.createElement('div');
            card.className = 'case-card';
            card.onclick = () => openRouletteScreen(key);

            const isFree = item.cost === 0;
            const priceText = isFree ? 'Бесплатно' : `⭐ ${formatStars(item.cost)}`;
            const priceClass = isFree ? 'case-price free' : 'case-price';

            card.innerHTML = `
                <img src="${item.image}" class="case-image" alt="${item.name}">
                <div class="case-title">${item.name}</div>
                <div class="${priceClass}">${priceText}</div>
            `;
            container.appendChild(card);
        }
    }

    function switchTab(tabId) {
        if (isRolling) return;

        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));

        document.getElementById(tabId).classList.add('active');
        
        const btnIndex = tabId === 'cases-tab' ? 0 : tabId === 'inventory-tab' ? 1 : 2;
        document.getElementById('bottom-tab-bar').children[btnIndex].classList.add('active');

        if(tabId === 'inventory-tab') {
            renderInventory();
        }
        if(tabId === 'profile-tab') {
            updateProfileStats();
        }
    }

    function openRouletteScreen(caseKey) {
        if (isRolling) return;
        currentCaseKey = caseKey;
        const caseData = CASE_CONFIG[caseKey];

        document.getElementById('active-case-title').textContent = caseData.name;
        document.getElementById('roll-button').textContent = caseData.cost === 0 ? 'Открыть бесплатно' : `Открыть за ⭐ ${formatStars(caseData.cost)}`;
        document.getElementById('roll-button').disabled = false;

        generateTrackItems(caseKey);
        renderCaseOdds(caseKey);

        document.getElementById('roulette-screen').style.display = 'flex';
    }

            row.className = 'odds-item-row';
            row.innerHTML = `
                <div class="odds-left-side">
                    <img src="${itemImg}" class="odds-item-thumb" alt="">
                    <span class="odds-item-title">${name}</span>
                </div>
                <div class="odds-right-side">
                    <span class="odds-item-value">⭐ ${formatStars(itemPrice)}</span>
                    <span class="odds-item-percent">${chance}%</span>
                </div>
            `;
            oddsList.appendChild(row);
        });
    }

    function closeRouletteScreen() {
        if (isRolling) return;
        document.getElementById('roulette-screen').style.display = 'none';
        currentCaseKey = null;
    }

    function generateTrackItems(caseKey) {
        const track = document.getElementById('wheel-track');
        track.style.transition = 'none';
        track.style.transform = 'translateX(0px)';
        track.innerHTML = '';

        const caseData = CASE_CONFIG[caseKey];
        const itemsPool = caseData.items.map(i => i[0]);

        for (let i = 0; i < 35; i++) {
            const randomItemName = itemsPool[Math.floor(Math.random() * itemsPool.length)];
            const el = document.createElement('div');
            el.className = 'roulette-item';
            el.innerHTML = `
                <img src="${getItemImage(randomItemName)}" alt="">
                <div class="item-name">${randomItemName}</div>
            `;
            track.appendChild(el);
        }
    }

    function dropRandomItem(caseKey) {
        const caseData = CASE_CONFIG[caseKey];
        const rand = Math.random() * 100;
        let cumulativeChance = 0;

        for (let i = 0; i < caseData.items.length; i++) {
            cumulativeChance += caseData.items[i][1];
            if (rand <= cumulativeChance) {
                return caseData.items[i][0];
            }
        }
        return caseData.items[0][0]; 
    }

    function startCaseRoll() {
        if (isRolling || !currentCaseKey) return;

        const caseData = CASE_CONFIG[currentCaseKey];
        if (userBalance < caseData.cost) {
            alert('Недостаточно звёзд на балансе!');
            return;
        }

        userBalance -= caseData.cost;
        updateBalanceDisplay();

        isRolling = true;
        document.getElementById('roll-button').disabled = true;

        const track = document.getElementById('wheel-track');
        const itemWidth = 100; 
        const totalItems = 35; 
        const targetIndex = 28; 

        const winItemName = dropRandomItem(currentCaseKey);

        const itemsPool = caseData.items.map(i => i[0]);
        track.innerHTML = '';
        
        for (let i = 0; i < totalItems; i++) {
            let name = itemsPool[Math.floor(Math.random() * itemsPool.length)];
            if (i === targetIndex) {
                name = winItemName;
            }
            const el = document.createElement('div');
            el.className = 'roulette-item';
            el.innerHTML = `
                <img src="${getItemImage(name)}" alt="">
                <div class="item-name">${name}</div>
            `;
            track.appendChild(el);
        }

        const wrapperWidth = document.querySelector('.roulette-wrapper').offsetWidth;
        const centerOffset = wrapperWidth / 2 - itemWidth / 2;
        const targetScrollX = -(targetIndex * itemWidth) + centerOffset;

        const innerRandomShift = Math.floor(Math.random() * 40) - 20; 
        const finalScrollX = targetScrollX + innerRandomShift;

        track.style.transition = 'transform 4s cubic-bezier(0.1, 0.6, 0.1, 1)';
        track.style.transform = `translateX(${finalScrollX}px)`;

        setTimeout(async () => {
            inventory[winItemName] = (inventory[winItemName] || 0) + 1;
            statsCasesOpened++;

            showWinModal(winItemName);
            isRolling = false;
            
            // Сохраняем состояние после открытия кейса
            await saveUserData();
        }, 4100);
    }

    function showWinModal(itemName) {
        const itemData = ITEMS[itemName];
        document.getElementById('win-item-image').src = itemData.img ? itemData.img : DEFAULT_IMG;
        document.getElementById('win-item-name').textContent = itemName;
        document.getElementById('win-item-price').textContent = formatStars(itemData.price);
        document.getElementById('win-modal').style.display = 'flex';
    }

    function closeWinModal() {
        document.getElementById('win-modal').style.display = 'none';
        if (currentCaseKey) {
            generateTrackItems(currentCaseKey);
            document.getElementById('roll-button').disabled = false;
        }
    }

    // ==================== ФУНКЦИЯ ИНВЕНТАРЯ ====================
function renderInventory() {
    const container = document.getElementById('inventory-items-container');
    container.innerHTML = '';
    
    let totalItemsCount = 0;
    let hasItems = false;
    
    for (let name in inventory) {
        const count = inventory[name];
        if (count <= 0) continue;
        
        hasItems = true;
        totalItemsCount += count;
        const itemData = ITEMS[name];
        
        const card = document.createElement('div');
        card.className = 'inventory-item-card';
        
        const isPinned = (pinnedItem === name);
        const pinBtnText = isPinned ? 'Открепить 📍' : 'Закрепить 📌';
        const pinBtnClass = isPinned ? 'pin-btn pinned' : 'pin-btn';

        card.innerHTML = `
            <div class="item-count-badge">x${count}</div>
            <img src="${itemData.img ? itemData.img : DEFAULT_IMG}" class="inventory-item-img" alt="">
            <div class="inventory-item-name">${name}</div>
            <div class="inventory-item-price">★ ${formatStars(itemData.price)}</div>
            <button class="${pinBtnClass}" onclick="togglePinItem('${name.replace(/'/g, "\\'")}')">${pinBtnText}</button>
        `;
        
        container.appendChild(card);
    }

    if (!hasItems) {
        container.innerHTML = `<div class="empty-state">Ваш инвентарь пуст.<br>Открывайте кейсы на первой вкладке!</div>`;
    }

    const countLabel = document.getElementById('inv-count-label');
    if (countLabel) {
        countLabel.textContent = `Предметов: ${totalItemsCount}`;
    }
}

// ==================== ФУНКЦИЯ ЗАКРЕПЛЕНИЯ ПРЕДМЕТА ====================
function togglePinItem(itemName) {
    if (pinnedItem === itemName) {
        // Если предмет уже закреплен — открепляем
        pinnedItem = null;
    } else {
        // Иначе закрепляем новый
        pinnedItem = itemName;
    }
    
    // Обновляем значки возле ников
    updatePinnedBadge();
    
    // Сохраняем изменения в Supabase
    saveUserData();
    
    // Обновляем инвентарь, чтобы поменялись кнопки
    renderInventory();
}

    async function sellAllItems() {
        let incomingProfit = 0;
        let itemsSold = 0;

        for (let name in inventory) {
            const count = inventory[name];
            if (count > 0) {
                const itemData = ITEMS[name];
                incomingProfit += itemData.price * count;
                itemsSold += count;
            }
        }

        if (itemsSold === 0) {
            alert('У вас нет предметов на продажу!');
            return;
        }

        userBalance += incomingProfit;
        statsTotalEarned += incomingProfit;
        inventory = {}; 

        updateBalanceDisplay();
        renderInventory();

        // Сохраняем состояние после продажи
        await saveUserData();

        alert(`Успешно продано предметов: ${itemsSold} шт. на сумму ⭐ ${formatStars(incomingProfit)}!`);
    }

    function updateProfileStats() {
        document.getElementById('stat-cases-opened').textContent = statsCasesOpened;
        document.getElementById('stat-total-earned').textContent = `⭐ ${formatStars(statsTotalEarned)}`;
    }

    window.onload = async () => {
        await initUserAndDB();
        renderCases();
    };
</script>
</body>
