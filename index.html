<!DOCTYPE html>

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h1, h2, h3 { margin: 10px 0; }
        .balance { color: #eab308; font-weight: bold; font-size: 1.2rem; }
        
        /* Сетка выбора кейсов */
        .case-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .case-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .case-card:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
        }
        .case-cost {
            color: #38bdf8;
            font-weight: bold;
            margin-top: 8px;
        }

        /* Экран открытия */
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
        }
        .btn:hover { background: #2563eb; }
        .btn-secondary { background: #475569; }
        .btn-secondary:hover { background: #334155; }

        /* Простая анимация рулетки */
        .roulette-wrapper {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            margin: 20px 0;
            border: 2px dashed #475569;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .drop-title { font-size: 1.5rem; font-weight: bold; margin-top: 10px; color: #4ade80; }
        .drop-price { color: #94a3b8; margin-top: 5px; }
    </style>
</head>

    function formatStars(num) {
        if (!num) return "0";
        let absNum = Math.abs(num);
        if (absNum >= 1e12) return (num / 1e12).toFixed(2) + "Т";
        if (absNum >= 1e9) return (num / 1e9).toFixed(2) + "Б";
        if (absNum >= 1e6) return (num / 1e6).toFixed(2) + "М";
        if (absNum >= 1e3) return (num / 1e3).toFixed(2) + "к";
        return num.toString();
    }

    // Загрузка игрока
    async function loadUserData() {
        try {
            // Сообщаем Telegram Mini App, что приложение готово к работе
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                const tgData = window.Telegram.WebApp.initDataUnsafe;
                if (tgData && tgData.user) {
                    userId = tgData.user.id.toString();
                    username = tgData.user.username || tgData.user.first_name || "Gamer";
                }
            }

            document.getElementById("username-display").innerText = "@" + username;

            // Получаем данные из таблицы users в Supabase
            let { data, error } = await supabase.from('users').select('*').eq('id', userId).maybeSingle();

            if (error) throw error;

            if (!data) {
                // Если игрока нет, создаем профиль со стартовым балансом 5000
                const newUser = { id: userId, username: username, balance: 5000, inventory: {} };
                const { error: insertError } = await supabase.from('users').insert([newUser]);
                if (insertError) throw insertError;
                userBalance = newUser.balance;
                userInventory = newUser.inventory;
            } else {
                userBalance = data.balance || 0;
                userInventory = data.inventory || {};
            }

            updateUI();
            renderMenu();

        } catch (err) {
            console.error("Критическая ошибка Supabase:", err);
            document.getElementById("username-display").innerText = "Ошибка подключения";
            document.getElementById("username-display").style.color = "#ef4444";
        }
    }

    function updateUI() {
        document.getElementById("balance-value").innerText = formatStars(userBalance);
    }

    function renderMenu() {
        const container = document.getElementById("case-grid-container");
        container.innerHTML = "";

        Object.keys(CASE_CONFIG).forEach(key => {
            const caseInfo = CASE_CONFIG[key];
            const card = document.createElement("div");
            card.className = "case-card";
            card.innerHTML = `
                <h3>${caseInfo.name}</h3>
                <div class="case-cost">${caseInfo.cost > 0 ? formatStars(caseInfo.cost) + " ⭐" : "Бесплатно"}</div>
            `;
            card.onclick = () => openCaseScreen(key);
            container.appendChild(card);
        });
    }

    function openCaseScreen(key) {
        selectedCaseKey = key;
        const caseInfo = CASE_CONFIG[key];
        
        document.getElementById("menu-screen").style.display = "none";
        document.getElementById("opening-screen").style.display = "block";
        document.getElementById("current-case-name").innerText = caseInfo.name;
        
        document.getElementById("roulette-status").style.display = "block";
        document.getElementById("roulette-status").innerText = `Стоимость: ${formatStars(caseInfo.cost)} ⭐`;
        document.getElementById("drop-result").style.display = "none";
        document.getElementById("open-btn").disabled = false;
    }

    function backToMenu() {
        document.getElementById("menu-screen").style.display = "block";
        document.getElementById("opening-screen").style.display = "none";
        selectedCaseKey = null;
    }

    function getRandomItem(itemsArray) {
        let totalWeight = itemsArray.reduce((sum, item) => sum + item[1], 0);
        let randomNum = Math.random() * totalWeight;
        
        for (let i = 0; i < itemsArray.length; i++) {
            if (randomNum < itemsArray[i][1]) {
                return itemsArray[i][0];
            }
            randomNum -= itemsArray[i][1];
        }
        return itemsArray[0][0];
    }

    async function triggerOpenCase() {
        if (!selectedCaseKey) return;
        
        const caseInfo = CASE_CONFIG[selectedCaseKey];
        
        if (userBalance < caseInfo.cost) {
            alert("Недостаточно звёзд!");
            return;
        }

        document.getElementById("open-btn").disabled = true;
        document.getElementById("roulette-status").innerText = "🎰 Открываем кейс...";

        const droppedItemName = getRandomItem(caseInfo.items);
        const itemPrice = ITEMS[droppedItemName] ? ITEMS[droppedItemName].price : 0;

        userBalance -= caseInfo.cost;
        userInventory[droppedItemName] = (userInventory[droppedItemName] || 0) + 1;

        const { error } = await supabase
            .from('users')
            .update({ balance: userBalance, inventory: userInventory })
            .eq('id', userId);

        if (error) {
            alert("Ошибка сохранения в базу данных!");
            document.getElementById("open-btn").disabled = false;
            return;
        }

        updateUI();

        setTimeout(() => {
            document.getElementById("roulette-status").style.display = "none";
            document.getElementById("drop-name").innerText = droppedItemName;
            document.getElementById("drop-price").innerText = `Ценность: ${formatStars(itemPrice)} ⭐`;
            document.getElementById("drop-result").style.display = "block";
            document.getElementById("open-btn").disabled = false;
        }, 1000);
    }

    // Инициализация при полной загрузке страницы
    window.addEventListener('DOMContentLoaded', loadUserData);
