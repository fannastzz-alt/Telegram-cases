<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Opening Simulator</title>
    <!-- Подключение Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #262626;
            --accent-color: #ffaa00;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--panel-color);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            position: relative;
            min-height: 90vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #444;
            object-fit: cover;
        }

        .username {
            font-weight: 600;
            font-size: 14px;
        }

        .balance {
            background: rgba(255, 170, 0, 0.1);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid rgba(255, 170, 0, 0.2);
        }

        /* Экраны */
        .screen {
            display: none;
        }

        #menu-screen {
            display: block;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Сетка кейсов */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .case-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .case-card:active {
            transform: scale(0.98);
        }

        .case-card:hover {
            border-color: var(--accent-color);
        }

        .case-card img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .case-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .case-price {
            color: var(--accent-color);
            font-size: 13px;
            font-weight: bold;
        }

        /* Рулетка обычная */
        .roulette-container {
            position: relative;
            width: 100%;
            height: 110px;
            background: #151515;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        .roulette-line {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: var(--accent-color);
            z-index: 10;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .roulette-track {
            display: flex;
            align-items: center;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            padding: 0 10px;
            will-change: transform;
        }

        .roulette-item {
            width: 80px;
            height: 90px;
            background: #2a2a2a;
            margin: 0 3px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border: 1px solid #3a3a3a;
            flex-shrink: 0;
        }

        .roulette-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .roulette-item .name {
            font-size: 10px;
            text-align: center;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            color: #ddd;
        }

        /* Мульти-рулетка (x5) */
        .roulettes-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            height: 100%;
            justify-content: center;
            padding: 4px 0;
        }

        .roulette-wrapper-mini {
            position: relative;
            width: 100%;
            height: 18px;
            background: #111;
            overflow: hidden;
            border: 1px solid #222;
        }

        .roulette-wrapper-mini::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: #ff5500;
            z-index: 5;
        }

        .roulette-tape-mini {
            display: flex;
            align-items: center;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            will-change: transform;
        }

        .roulette-item-mini {
            width: 80px;
            height: 16px;
            border-right: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1c1c1c;
            flex-shrink: 0;
        }

        .roulette-item-mini img {
            height: 14px;
            object-fit: contain;
        }

        /* Кнопки действий */
        .actions-block {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #444;
            color: #fff;
        }

        /* Списки предметов / Лут / Инвентарь */
        .loot-list, .inventory-list {
            background: rgba(0,0,0,0.15);
            border-radius: 12px;
            padding: 8px;
            max-height: 260px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .loot-item-row, .inventory-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .loot-item-row:last-child, .inventory-item-row:last-child {
            border-bottom: none;
        }

        .loot-name, .inv-item-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .loot-name img, .inv-item-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .loot-details {
            text-align: right;
        }

        .loot-chance {
            font-size: 11px;
            color: var(--text-muted);
        }

        .loot-price {
            font-size: 12px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .inv-item-count {
            color: var(--accent-color);
            font-weight: bold;
            margin-left: 4px;
        }

        .btn-sell {
            background: #cc3333;
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-sell:hover {
            background: #e53935;
        }

        .inventory-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 20px 0;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Шапка приложения -->
    <header>
        <div class="user-info">
            <img id="user-avatar" class="avatar" src="https://via.placeholder.com/150" alt="Avatar">
            <span id="user-name" class="username">Загрузка...</span>
        </div>
        <div id="balance-display" class="balance">0 ★</div>
    </header>

    <!-- ЭКРАН 1: ГЛАВНОЕ МЕНЮ (Кейсы и Инвентарь) -->
    <div id="menu-screen" class="screen">
        <h2>Доступные кейсы</h2>
        <div class="cases-grid" id="cases-container"></div>

        <h2>Ваш инвентарь <span id="inv-total-count" style="font-size:13px; color:gray;">(0 шт.)</span></h2>
        <div class="inventory-list" id="inventory-list-container">
            <div class="inventory-empty">Загрузка данных инвентаря...</div>
        </div>
    </div>

    <!-- ЭКРАН 2: ПРОЦЕСС ОТКРЫТИЯ КЕЙСА -->
    <div id="opening-screen" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h2 id="case-title" style="margin:0;">Открытие кейса</h2>
            <button class="btn btn-secondary" style="padding:6px 12px; font-size:12px; flex:none;" onclick="backToMenu()">Назад</button>
        </div>

        <!-- Контейнер рулетки -->
        <div class="roulette-container">
            <div class="roulette-line"></div>
            <div id="roulette-track" class="roulette-track"></div>
        </div>

        <!-- Кнопки открытия -->
        <div class="actions-block">
            <button id="open-btn" class="btn" onclick="startOpening(1)">Открыть x1</button>
            <button id="open-btn-x5" class="btn" style="background:#ff5500;" onclick="startOpening(5)">Быстрый x5</button>
        </div>

        <h2>Содержимое кейса</h2>
        <div class="loot-list" id="loot-list-container"></div>
    </div>
</div>

<script>
    // --- НАСТРОЙКИ И ДАННЫЕ ИГРЫ ---
    const ITEMS = {
        "M4A4 | Howl": { price: 1500 },
        "AWP | Dragon Lore": { price: 3500 },
        "AK-47 | Case Hardened": { price: 450 },
        "Glock-18 | Fade": { price: 600 },
        "USP-S | Kill Confirmed": { price: 120 },
        "Desert Eagle | Printstream": { price: 180 },
        "P250 | Sand Dune": { price: 1 },
        "Auga | Contractor": { price: 2 },
        "Nova | Predator": { price: 1.5 }
    };

    const CASE_CONFIG = {
        "legendary_case": {
            name: "Легендарный кейс",
            cost: 250,
            image: "https://cdn-icons-png.flaticon.com/512/2854/2854586.png",
            items: [
                ["M4A4 | Howl", 5],
                ["AWP | Dragon Lore", 2],
                ["AK-47 | Case Hardened", 13],
                ["Glock-18 | Fade", 10],
                ["USP-S | Kill Confirmed", 30],
                ["Desert Eagle | Printstream", 40]
            ]
        },
        "cheap_case": {
            name: "Бюджетный кейс",
            cost: 10,
            image: "https://cdn-icons-png.flaticon.com/512/679/679720.png",
            items: [
                ["USP-S | Kill Confirmed", 2],
                ["Desert Eagle | Printstream", 3],
                ["P250 | Sand Dune", 45],
                ["Auga | Contractor", 30],
                ["Nova | Predator", 20]
            ]
        }
    };

    // --- СОСТОЯНИЕ ИГРОКА (ДАННЫЕ ПО УМОЛЧАНИЮ) ---
    let userId = "local_user";
    let userBalance = 1000;
    let userInventory = {};
    let selectedCaseKey = "";
    let isRolling = false;
    let dbClient = null;

    // Инициализация Supabase (если данные прописаны)
    const SUPABASE_URL = ""; 
    const SUPABASE_KEY = ""; 

    if (SUPABASE_URL && SUPABASE_KEY) {
        try {
            dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) {
            console.error("Ошибка инициализации базы данных:", e);
        }
    }

    // --- ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ ---
    async function initApp() {
        // Попытка получить Telegram ID игрока, если скрипт в WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = String(tg.initDataUnsafe.user.id);
                document.getElementById("user-name").textContent = tg.initDataUnsafe.user.first_name;
                if (tg.initDataUnsafe.user.photo_url) {
                    document.getElementById("user-avatar").src = tg.initDataUnsafe.user.photo_url;
                }
            } else {
                document.getElementById("user-name").textContent = "Игрок (Браузер)";
            }
        } else {
            document.getElementById("user-name").textContent = "Игрок (Локально)";
        }

        // Загрузка сейвов
        await loadUserData();
        renderCasesMenu();
        renderInventory();
        updateUI();
    }

    async function loadUserData() {
        if (dbClient) {
            try {
                let { data, error } = await dbClient.from('users').select('*').eq('id', userId).single();
                if (error && error.code === 'PGRST116') {
                    // Создаем профиль в БД, если его нет
                    const newUser = { id: userId, balance: 1000, inventory: {} };
                    await dbClient.from('users').insert([newUser]);
                    userBalance = newUser.balance;
                    userInventory = newUser.inventory;
                } else if (data) {
                    userBalance = data.balance ?? 1000;
                    userInventory = data.inventory ?? {};
                }
            } catch(e) {
                console.error("Не удалось прочитать данные с БД. Режим локального хранилища.", e);
                loadLocalBackup();
            }
        } else {
            loadLocalBackup();
        }
    }

    function loadLocalBackup() {
        const savedBalance = localStorage.getItem(`bal_${userId}`);
        const savedInv = localStorage.getItem(`inv_${userId}`);
        if (savedBalance !== null) userBalance = parseFloat(savedBalance);
        if (savedInv !== null) userInventory = JSON.parse(savedInv);
    }

    async function saveUserData() {
        updateUI();
        localStorage.setItem(`bal_${userId}`, userBalance);
        localStorage.setItem(`inv_${userId}`, JSON.stringify(userInventory));

        if (dbClient) {
            try {
                await dbClient.from('users').update({ 
                    balance: userBalance, 
                    inventory: userInventory 
                }).eq('id', userId);
            } catch(e) {
                console.error("Ошибка бэкапа в Supabase:", e);
            }
        }
    }

    function updateUI() {
        document.getElementById("balance-display").textContent = formatStars(userBalance) + " ★";
    }

    function formatStars(num) {
        return Number(num).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    function getItemImage(itemName) {
        // Заглушка картинок для предметов (можно заменить реальными ссылками)
        return "https://cdn-icons-png.flaticon.com/512/8113/8113110.png";
    }

    // --- СБОРКА ИНТЕРФЕЙСА МЕНЮ ---
    function renderCasesMenu() {
        const container = document.getElementById("cases-container");
        container.innerHTML = "";
        for (const key in CASE_CONFIG) {
            const c = CASE_CONFIG[key];
            const card = document.createElement("div");
            card.className = "case-card";
            card.onclick = () => selectCase(key);
            card.innerHTML = `
                <img src="${c.image}" alt="">
                <div class="case-name">${c.name}</div>
                <div class="case-price">${formatStars(c.cost)} ★</div>
            `;
            container.appendChild(card);
        }
    }

    function selectCase(key) {
        if (isRolling) return;
        selectedCaseKey = key;
        const c = CASE_CONFIG[key];
        
        document.getElementById("case-title").textContent = c.name;
        
        const track = document.getElementById("roulette-track");
        track.style.opacity = "1";
        track.style.transition = "none";
        track.style.transform = "translate3d(0px, 0px, 0px)";
        track.innerHTML = "";

        // Набиваем базовый трек превью-айтемами
        for(let i=0; i<15; i++) {
            const randomItemName = c.items[Math.floor(Math.random() * c.items.length)][0];
            track.appendChild(createRouletteItemNode(randomItemName));
        }

        // Рендерим лут-лист
        const lootContainer = document.getElementById("loot-list-container");
        lootContainer.innerHTML = "";
        c.items.forEach(itemArr => {
            const name = itemArr[0];
            const chance = itemArr[1];
            const itemInfo = ITEMS[name] || {price: 0};
            const row = document.createElement("div");
            row.className = "loot-item-row";
            row.innerHTML = `
                <div class="loot-name">
                    <img src="${getItemImage(name)}" alt="">
                    <span>${name}</span>
                </div>
                <div class="loot-details">
                    <div class="loot-chance">${chance}%</div>
                    <div class="loot-price">${formatStars(itemInfo.price)} ★</div>
                </div>
            `;
            lootContainer.appendChild(row);
        });

        document.getElementById("menu-screen").style.display = "none";
        document.getElementById("opening-screen").style.display = "block";
    }

    function createRouletteItemNode(itemName) {
        const div = document.createElement("div");
        div.className = "roulette-item";
        div.innerHTML = `
            <img src="${getItemImage(itemName)}" alt="">
            <div class="name">${itemName}</div>
        `;
        return div;
    }

    function backToMenu() {
        if (isRolling) return;
        document.getElementById("opening-screen").style.display = "none";
        document.getElementById("menu-screen").style.display = "block";
    }

    function getRandomItem(itemsConfig) {
        let rand = Math.random() * 100;
        let sum = 0;
        for (let i = 0; i < itemsConfig.length; i++) {
            sum += itemsConfig[i][1];
            if (rand <= sum) return itemsConfig[i][0];
        }
        return itemsConfig[0][0];
    }

    // --- ЛОГИКА ТЕХНИЧЕСКОГО ОТКРЫТИЯ И КРУТИЛОК ---
    async function startOpening(count = 1) {
        if (isRolling) return; 
        
        const caseInfo = CASE_CONFIG[selectedCaseKey];
        const totalCost = caseInfo.cost * count;

        if (userBalance < totalCost) {
            alert(`Недостаточно ⭐! Требуется ${formatStars(totalCost)} ★`);
            return;
        }

        userBalance -= totalCost;
        updateUI();

        if (dbClient) {
            try {
                await dbClient.from('users').update({ balance: userBalance }).eq('id', userId);
            } catch (e) {
                console.error("Ошибка сохранения баланса:", e);
            }
        }

        document.getElementById("open-btn").disabled = true;
        document.getElementById("open-btn-x5").disabled = true;

        if (count === 1) {
            triggerOpenCase(); 
        } else {
            startMultiRoulette(5); 
        }
    }

    function triggerOpenCase() {
        isRolling = true;
        const currentCase = CASE_CONFIG[selectedCaseKey];
        const winItem = getRandomItem(currentCase.items);

        const track = document.getElementById("roulette-track");
        track.style.transition = "none";
        track.style.transform = "translate3d(0px, 0px, 0px)";
        track.innerHTML = "";

        const itemWidth = 86; // 80px + 6px маргины
        const winIndex = 25;  // Индекс победного элемента

        for (let i = 0; i < 35; i++) {
            let name = (i === winIndex) ? winItem : getRandomItem(currentCase.items);
            track.appendChild(createRouletteItemNode(name));
        }

        setTimeout(() => {
            track.style.transition = "transform 4s cubic-bezier(0.15, 0.85, 0.35, 1)";
            const containerWidth = document.querySelector(".roulette-container").clientWidth;
            // Смещение к центру победного элемента с легким случайным сдвигом внутри карточки
            const randShift = Math.floor(Math.random() * 40) - 20;
            const targetX = -(winIndex * itemWidth - containerWidth / 2 + itemWidth / 2) + randShift;
            track.style.transform = `translate3d(${targetX}px, 0px, 0px)`;
        }, 50);

        setTimeout(() => {
            isRolling = false;
            document.getElementById("open-btn").disabled = false;
            document.getElementById("open-btn-x5").disabled = false;
            
            // Добавляем в инвентарь
            userInventory[winItem] = (userInventory[winItem] || 0) + 1;
            saveUserData();
            renderInventory();
            
            alert(`🎉 Вы выбили: ${winItem}!`);
        }, 4100);
    }

    function startMultiRoulette(count = 5) {
        isRolling = true;
        const currentCase = CASE_CONFIG[selectedCaseKey];
        
        const singleRoulette = document.getElementById("roulette-track");
        if (singleRoulette) singleRoulette.style.opacity = "0";

        const rouletteContainer = document.querySelector(".roulette-container");
        
        const oldMulti = document.querySelector(".roulettes-container");
        if (oldMulti) oldMulti.remove();

        const roulettesWrap = document.createElement("div");
        roulettesWrap.className = "roulettes-container";
        rouletteContainer.appendChild(roulettesWrap);

        const winItems = [];
        const winIndex = 25;
        const itemWidth = 81; // 80px + 1px border

        for (let r = 0; r < count; r++) {
            const winItemName = getRandomItem(currentCase.items);
            winItems.push(winItemName);

            const wrapper = document.createElement("div");
            wrapper.className = "roulette-wrapper-mini";

            const tape = document.createElement("div");
            tape.className = "roulette-tape-mini";
            tape.id = `tape-${r}`;

            for (let i = 0; i < 35; i++) {
                const itemName = (i === winIndex) ? winItemName : getRandomItem(currentCase.items);
                const itemImg = getItemImage(itemName);

                const itemDiv = document.createElement("div");
                itemDiv.className = "roulette-item-mini";
                itemDiv.innerHTML = `<img src="${itemImg}" alt="${itemName}">`;
                tape.appendChild(itemDiv);
            }
            wrapper.appendChild(tape);
            roulettesWrap.appendChild(wrapper);

            setTimeout(() => {
                tape.style.transition = "transform 4s cubic-bezier(0.15, 0.85, 0.35, 1)";
                const containerWidth = wrapper.clientWidth;
                const randShift = Math.floor(Math.random() * 30) - 15;
                const targetX = -(winIndex * itemWidth - containerWidth / 2 + itemWidth / 2) + randShift;
                tape.style.transform = `translate3d(${targetX}px, 0px, 0px)`;
            }, 50);
        }

        setTimeout(() => {
            isRolling = false;
            document.getElementById("open-btn").disabled = false;
            document.getElementById("open-btn-x5").disabled = false;

            // Начисляем все выпавшие предметы
            winItems.forEach(item => {
                userInventory[item] = (userInventory[item] || 0) + 1;
            });
            saveUserData();
            renderInventory();

            alert(`🎉 Ваши награды:\n${winItems.map(i => "• " + i).join("\n")}`);
            
            // Возвращаем обычную рулетку
            roulettesWrap.remove();
            if (singleRoulette) singleRoulette.style.opacity = "1";
        }, 4200);
    }

    // --- РАБОТА С ИНВЕНТАРЕМ И ПРОДАЖАМИ ---
    function renderInventory() {
        const container = document.getElementById("inventory-list-container");
        const totalCountSpan = document.getElementById("inv-total-count");
        container.innerHTML = "";

        let totalItems = 0;
        let hasItems = false;

        for (const name in userInventory) {
            const count = userInventory[name];
            if (count <= 0) continue;
            hasItems = true;
            totalItems += count;

            const itemInfo = ITEMS[name] || {price: 0};
            const row = document.createElement("div");
            row.className = "inventory-item-row";
            row.innerHTML = `
                <div class="inv-item-info">
                    <img class="inv-item-img" src="${getItemImage(name)}" alt="">
                    <span>${name}</span>
                    <span class="inv-item-count">${count} шт.</span>
                </div>
                <button class="btn-sell" onclick="sellItem('${name}')">Продать за ${formatStars(itemInfo.price)} ★</button>
            `;
            container.appendChild(row);
        }

        totalCountSpan.textContent = `(${totalItems} шт.)`;

        if (!hasItems) {
            container.innerHTML = `<div class="inventory-empty">Здесь пока ничего нет. Откройте свой первый кейс!</div>`;
        }
    }

    function sellItem(name) {
        if (isRolling) return;
        if (!userInventory[name] || userInventory[name] <= 0) return;

        const itemInfo = ITEMS[name] || {price: 0};
        
        userInventory[name] -= 1;
        userBalance += itemInfo.price;

        saveUserData();
        renderInventory();
    }

    // Запуск приложения при полной загрузке страницы
    window.onload = initApp;
</script>
</body>
</html>
