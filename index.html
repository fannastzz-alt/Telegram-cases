<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор Кейсов Pro</title>
    <!-- Подключаем официальный скрипт Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #1c1c1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Верхняя панель игрока */
        .header-panel {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c2c2e;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .user-info {
            font-size: 15px;
            font-weight: 600;
            color: #aeaeb2;
        }
        
        .user-info span {
            color: #ffffff;
        }

        .balance-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 214, 10, 0.15);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #ffd60a;
        }

        .balance-value {
            color: #ffd60a;
            font-weight: bold;
            font-size: 16px;
        }

        /* Контейнер кейса */
        .case-container {
            width: 100%;
            max-width: 400px;
            background: #2c2c2e;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .price-tag {
            font-size: 14px;
            color: #ffd60a;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Рулетка */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            height: 95px;
            background: #1c1c1e;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #3a3a3c;
            margin-bottom: 20px;
        }

        /* Красная линия прицела */
        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background-color: #ff453a;
            z-index: 10;
            box-shadow: 0 0 8px #ff453a;
        }

        .roulette-inner {
            display: flex;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transition: transform 4s cubic-bezier(0.1, 0.6, 0.1, 1);
            will-change: transform;
        }

        .item-card {
            width: 90px;
            height: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            border-right: 1px solid #2c2c2e;
            flex-shrink: 0;
            background: #2c2c2e;
            padding: 6px;
        }

        /* Стили для картинок предметов в рулетке */
        .item-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-bottom: 6px;
        }

        /* Главная кнопка кручения */
        .action-btn {
            width: 100%;
            background: #30d158;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(48, 209, 88, 0.3);
            transition: background 0.2s, transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn:disabled {
            background: #3a3a3c;
            color: #8e8e93;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Окно с выигрышем */
        .reward-panel {
            display: none;
            width: 100%;
            max-width: 400px;
            background: #2c2c2e;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reward-title {
            font-size: 15px;
            color: #aeaeb2;
            margin-bottom: 10px;
        }

        .reward-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: #1c1c1e;
            padding: 20px 40px;
            border-radius: 12px;
            border: 2px solid #ffd60a;
            margin-bottom: 20px;
            min-width: 160px;
        }

        .reward-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .reward-name {
            font-size: 16px;
            font-weight: bold;
        }

        .choice-buttons {
            display: flex;
            gap: 12px;
        }

        .choice-btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        .keep-btn {
            background: #0a84ff;
            color: white;
        }

        .sell-btn {
            background: rgba(255, 214, 10, 0.2);
            color: #ffd60a;
            border: 1px solid #ffd60a;
        }
    </style>
</head>
<body>

    <!-- Верхняя панель -->
    <div class="header-panel">
        <div class="user-info">Привет, <span id="username">Игрок</span>!</div>
        <div class="balance-box">
            <span>🪙</span>
            <div class="balance-value" id="balance-display">1000</div>
        </div>
    </div>

    <!-- Основной блок кейса -->
    <div class="case-container" id="case-block">
        <h1>Кейс "Желание"</h1>
        <div class="price-tag">Стоимость открытия: 150 🪙</div>

        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div class="roulette-inner" id="roulette-track"></div>
        </div>

        <button class="action-btn" id="spin-button" onclick="startSpin()">Испытать удачу</button>
    </div>

    <!-- Блок решения (Забрать / Продать) -->
    <div class="reward-panel" id="reward-block">
        <div class="reward-title">🎉 Поздравляем! Ваш выигрыш:</div>
        <div class="reward-item" id="reward-card">
            <img class="reward-img" id="reward-image" src="" alt="выигрыш">
            <span class="reward-name" id="reward-name">Предмет</span>
        </div>
        <div class="choice-buttons">
            <button class="choice-btn keep-btn" onclick="claimItem()">В инвентарь</button>
            <button class="choice-btn sell-btn" id="sell-button-text" onclick="sellItem()">Продать</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Подгружаем имя пользователя из Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        // Логика баланса
        let balance = 1000;
        const spinCost = 150;
        let lastWonItem = null;

        // Список предметов: [Название, Путь к картинке, Цена продажи, Цвет редкости]
        const pool = [
            ["Froggy", "frog.png", 50, "#30d158"],
            ["Froggy", "frog.png", 50, "#30d158"],
            ["Rose", "rose.png", 100, "#0a84ff"],
            ["Rose", "rose.png", 100, "#0a84ff"],
            ["Birdy", "bird.png", 120, "#bf5af2"],
            ["Strike Key", "key.png", 300, "#ffd60a"],
            ["Diamond", "diamond.png", 800, "#ff9f0a"]
        ];

        const track = document.getElementById('roulette-track');
        const spinBtn = document.getElementById('spin-button');
        const caseBlock = document.getElementById('case-block');
        const rewardBlock = document.getElementById('reward-block');
        const balanceDisplay = document.getElementById('balance-display');

        const cardWidth = 90; // Ширина карточки в пикселях

        // Наполнение рулетки перед стартом
        function setupRoulette() {
            track.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                const randomItem = pool[Math.floor(Math.random() * pool.length)];
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.borderBottom = `4px solid ${randomItem[3]}`;
                card.innerHTML = `
                    <img class="item-img" src="${randomItem[1]}" alt="">
                    <span>${randomItem[0]}</span>
                `;
                track.appendChild(card);
            }
        }

        // Функция запуска анимации
        function startSpin() {
            if (balance < spinCost) {
                tg.HapticFeedback.notificationOccurred('error');
                alert("Недостаточно монет для открытия кейса!");
                return;
            }

            balance -= spinCost;
            updateBalanceDisplay();
            
            spinBtn.disabled = true;
            rewardBlock.style.display = 'none';
            tg.HapticFeedback.impactOccurred('medium');

            track.style.transition = 'none';
            track.style.transform = 'translateX(0px)';
            
            setupRoulette();

            setTimeout(() => {
                const winIndex = 35; // Предмет, на котором остановится рулетка
                const winItem = pool[Math.floor(Math.random() * pool.length)];
                lastWonItem = winItem;

                const cards = track.getElementsByClassName('item-card');
                cards[winIndex].style.borderBottom = `4px solid ${winItem[3]}`;
                cards[winIndex].innerHTML = `
                    <img class="item-img" src="${winItem[1]}" alt="">
                    <span>${winItem[0]}</span>
                `;

                const wrapperWidth = document.querySelector('.roulette-wrapper').clientWidth;
                const centerOffset = (wrapperWidth / 2) - (cardWidth / 2);
                const targetX = -(winIndex * cardWidth) + centerOffset;

                track.style.transition = 'transform 4s cubic-bezier(0.1, 0.6, 0.1, 1)';
                track.style.transform = `translateX(${targetX}px)`;

                setTimeout(() => {
                    tg.HapticFeedback.notificationOccurred('success');
                    
                    // Обновляем окно выигрыша новой картинкой
                    document.getElementById('reward-image').src = winItem[1];
                    document.getElementById('reward-name').innerText = winItem[0];
                    document.getElementById('reward-card').style.borderColor = winItem[3];
                    document.getElementById('sell-button-text').innerText = `Продать за ${winItem[2]} 🪙`;
                    
                    rewardBlock.style.display = 'block';
                    spinBtn.disabled = false;
                }, 4100);

            }, 50);
        }

        function claimItem() {
            tg.HapticFeedback.impactOccurred('light');
            alert(`Предмет ${lastWonItem[0]} добавлен в инвентарь!`);
            rewardBlock.style.display = 'none';
        }

        function sellItem() {
            if (!lastWonItem) return;
            balance += lastWonItem[2];
            updateBalanceDisplay();
            tg.HapticFeedback.notificationOccurred('success');
            alert(`Предмет успешно продан за ${lastWonItem[2]} монет!`);
            rewardBlock.style.display = 'none';
            lastWonItem = null;
        }

        function updateBalanceDisplay() {
            balanceDisplay.innerText = balance;
        }

        setupRoulette();
    </script>
</body>
</html>
