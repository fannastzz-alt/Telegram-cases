<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор Кейсов Pro</title>
    
    <!-- Подключаем Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Подключаем Firebase (App и Realtime Database) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #1c1c1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 20px 90px 20px; /* Отступ снизу для меню навигации */
        }

        /* Верхняя панель */
        .header-panel {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c2c2e;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .user-info {
            font-size: 15px;
            font-weight: 600;
            color: #aeaeb2;
        }
        
        .user-info span {
            color: #ffffff;
        }

        .balance-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 214, 10, 0.15);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #ffd60a;
        }

        .balance-value {
            color: #ffd60a;
            font-weight: bold;
            font-size: 16px;
        }

        /* Экраны (Вкладки) */
        .page-screen {
            display: none;
            width: 100%;
            max-width: 400px;
        }

        .page-screen.active {
            display: block;
        }

        /* Контейнер кейса */
        .case-container {
            background: #2c2c2e;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .price-tag {
            font-size: 14px;
            color: #ffd60a;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .roulette-wrapper {
            position: relative;
            width: 100%;
            height: 95px;
            background: #1c1c1e;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #3a3a3c;
            margin-bottom: 20px;
        }

        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background-color: #ff453a;
            z-index: 10;
            box-shadow: 0 0 8px #ff453a;
        }

        .roulette-inner {
            display: flex;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transition: transform 4s cubic-bezier(0.1, 0.6, 0.1, 1);
            will-change: transform;
        }

        .item-card {
            width: 90px;
            height: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            border-right: 1px solid #2c2c2e;
            flex-shrink: 0;
            background: #2c2c2e;
            padding: 6px;
        }

        .item-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-bottom: 6px;
        }

        .action-btn {
            width: 100%;
            background: #30d158;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(48, 209, 88, 0.3);
        }

        .action-btn:disabled {
            background: #3a3a3c;
            color: #8e8e93;
            box-shadow: none;
        }

        /* Окно выигрыша рулетки */
        .reward-panel {
            display: none;
            background: #2c2c2e;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reward-title {
            font-size: 15px;
            color: #aeaeb2;
            margin-bottom: 10px;
        }

        .reward-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: #1c1c1e;
            padding: 20px 40px;
            border-radius: 12px;
            border: 2px solid #ffd60a;
            margin-bottom: 20px;
            min-width: 160px;
        }

        .reward-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .reward-name {
            font-size: 16px;
            font-weight: bold;
        }

        .choice-buttons {
            display: flex;
            gap: 12px;
        }

        .choice-btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        .keep-btn {
            background: #0a84ff;
            color: white;
        }

        .sell-btn {
            background: rgba(255, 214, 10, 0.2);
            color: #ffd60a;
            border: 1px solid #ffd60a;
        }

        /* СЕТКА ИНВЕНТАРЯ */
        .inventory-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }

        .inventory-item {
            background: #2c2c2e;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 4px solid #3a3a3c;
        }

        .inventory-item img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-bottom: 6px;
        }

        .inventory-item .item-price {
            color: #ffd60a;
            font-size: 10px;
            margin-top: 2px;
        }

        .empty-text {
            grid-column: span 3;
            color: #aeaeb2;
            font-size: 14px;
            padding: 40px 0;
            text-align: center;
        }

        /* НИЖНЕЕ МЕНЮ НАВИГАЦИИ (ТАББАР) */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #2c2c2e;
            border-top: 1px solid #3a3a3c;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 900;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8e8e93;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            width: 45%;
            height: 100%;
        }

        .nav-item.active {
            color: #0a84ff;
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
        
        /* Загрузочный экран */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1c1c1e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            font-size: 18px;
            font-weight: bold;
            color: #aeaeb2;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">Синхронизация с базой данных...</div>

    <!-- Верхняя панель игрока -->
    <div class="header-panel">
        <div class="user-info">Привет, <span id="username">Игрок</span>!</div>
        <div class="balance-box">
            <span>🪙</span>
            <div class="balance-value" id="balance-display">0</div>
        </div>
    </div>

    <!-- ЭКРАН 1: КЕЙСЫ -->
    <div id="screen-cases" class="page-screen active">
        <div class="case-container" id="case-block">
            <h1>Кейс "Желание"</h1>
            <div class="price-tag">Стоимость открытия: 150 🪙</div>

            <div class="roulette-wrapper">
                <div class="pointer"></div>
                <div class="roulette-inner" id="roulette-track"></div>
            </div>

            <button class="action-btn" id="spin-button" onclick="startSpin()" disabled>Загрузка...</button>
        </div>

        <div class="reward-panel" id="reward-block">
            <div class="reward-title">🎉 Поздравляем! Ваш выигрыш:</div>
            <div class="reward-item" id="reward-card">
                <img class="reward-img" id="reward-image" src="" alt="выигрыш">
                <span class="reward-name" id="reward-name">Предмет</span>
            </div>
            <div class="choice-buttons">
                <button class="choice-btn keep-btn" onclick="claimItem()">В инвентарь</button>
                <button class="choice-btn sell-btn" id="sell-button-text" onclick="sellItem()">Продать</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 2: ИНВЕНТАРЬ -->
    <div id="screen-inventory" class="page-screen">
        <div class="inventory-title">Ваш инвентарь</div>
        <div class="inventory-grid" id="inventory-container">
            <div class="empty-text">У вас пока нет предметов. Крутите кейсы!</div>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ НАВИГАЦИИ -->
    <div class="nav-bar">
        <div class="nav-item active" id="nav-btn-cases" onclick="switchPage('cases')">
            <div class="nav-icon">📦</div>
            <div>Кейсы</div>
        </div>
        <div class="nav-item" id="nav-btn-inventory" onclick="switchPage('inventory')">
            <div class="nav-icon">🎒</div>
            <div>Инвентарь</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDi-fArNcqqttIJYyvWvzF_h1PtdMykGOA",
            authDomain: "telegramcasesimulator.firebaseapp.com",
            databaseURL: "https://telegramcasesimulator-default-rtdb.firebaseio.com",
            projectId: "telegramcasesimulator",
            storageBucket: "telegramcasesimulator.firebasestorage.app",
            messagingSenderId: "1098622659944",
            appId: "1:1098622659944:web:c71f2256c3579e5dbebadd"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userId = "demo_user"; 
        let firstName = "Игрок";

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id.toString();
            firstName = tg.initDataUnsafe.user.first_name;
        }
        document.getElementById('username').innerText = firstName;

        let balance = 0;
        let inventory = []; // Сюда подгружаются предметы из базы: {id, name, img, price, color}
        const spinCost = 150;
        let lastWonItem = null;

        const pool = [
            ["Froggy", "frog.png", 50, "#30d158"],
            ["Froggy", "frog.png", 50, "#30d158"],
            ["Rose", "rose.png", 100, "#0a84ff"],
            ["Rose", "rose.png", 100, "#0a84ff"],
            ["Birdy", "bird.png", 120, "#bf5af2"],
            ["Strike Key", "key.png", 300, "#ffd60a"],
            ["Diamond", "diamond.png", 800, "#ff9f0a"]
        ];

        const track = document.getElementById('roulette-track');
        const spinBtn = document.getElementById('spin-button');
        const rewardBlock = document.getElementById('reward-block');
        const balanceDisplay = document.getElementById('balance-display');
        const inventoryContainer = document.getElementById('inventory-container');
        const cardWidth = 90;

        // Синхронизация данных пользователя с Firebase
        const userRef = database.ref('users/' + userId);
        userRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                balance = data.balance !== undefined ? data.balance : 1000;
                
                // Обрабатываем инвентарь из Firebase
                if (data.inventory) {
                    // Firebase может отдавать объект, превращаем его в массив
                    inventory = Object.keys(data.inventory).map(key => ({
                        firebaseId: key,
                        ...data.inventory[key]
                    }));
                } else {
                    inventory = [];
                }
            } else {
                balance = 1000;
                inventory = [];
                userRef.set({
                    username: firstName,
                    balance: balance,
                    inventory: {}
                });
            }
            
            balanceDisplay.innerText = balance;
            renderInventory();
            
            document.getElementById('loading-overlay').style.display = 'none';
            spinBtn.disabled = false;
            if (spinBtn.innerText === "Загрузка...") {
                spinBtn.innerText = "Испытать удачу";
            }
        });

        function updateFirebaseBalance() {
            userRef.update({ balance: balance });
        }

        // Переключение экранов (Кейсы / Инвентарь)
        function switchPage(page) {
            tg.HapticFeedback.impactOccurred('light');
            document.getElementById('screen-cases').classList.remove('active');
            document.getElementById('screen-inventory').classList.remove('active');
            document.getElementById('nav-btn-cases').classList.remove('active');
            document.getElementById('nav-btn-inventory').classList.remove('active');

            if (page === 'cases') {
                document.getElementById('screen-cases').classList.add('active');
                document.getElementById('nav-btn-cases').classList.add('active');
            } else if (page === 'inventory') {
                document.getElementById('screen-inventory').classList.add('active');
                document.getElementById('nav-btn-inventory').classList.add('active');
                renderInventory();
            }
        }

        // Отрисовка предметов в инвентаре
        function renderInventory() {
            inventoryContainer.innerHTML = '';
            if (inventory.length === 0) {
                inventoryContainer.innerHTML = '<div class="empty-text">У вас пока нет предметов. Крутите кейсы!</div>';
                return;
            }

            inventory.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'inventory-item';
                card.style.borderBottom = `4px solid ${item.color}`;
                card.innerHTML = `
                    <img src="${item.img}" alt="${item.name}">
                    <span>${item.name}</span>
                    <span class="item-price">${item.price} 🪙</span>
                `;
                
                // При клике на предмет в инвентаре — предлагаем продать его
                card.onclick = () => {
                    const confirmSell = confirm(`Хотите продать ${item.name} за ${item.price} 🪙?`);
                    if (confirmSell) {
                        sellItemFromInventory(item.firebaseId, item.price);
                    }
                };

                inventoryContainer.appendChild(card);
            });
        }

        function setupRoulette() {
            track.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                const randomItem = pool[Math.floor(Math.random() * pool.length)];
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.borderBottom = `4px solid ${randomItem[3]}`;
                card.innerHTML = `
                    <img class="item-img" src="${randomItem[1]}" alt="">
                    <span>${randomItem[0]}</span>
                `;
                track.appendChild(card);
            }
        }

        function startSpin() {
            if (balance < spinCost) {
                tg.HapticFeedback.notificationOccurred('error');
                alert("Недостаточно монет!");
                return;
            }

            balance -= spinCost;
            updateFirebaseBalance();
            
            spinBtn.disabled = true;
            rewardBlock.style.display = 'none';
            tg.HapticFeedback.impactOccurred('medium');

            track.style.transition = 'none';
            track.style.transform = 'translateX(0px)';
            setupRoulette();

            setTimeout(() => {
                const winIndex = 35;
                const winItem = pool[Math.floor(Math.random() * pool.length)];
                lastWonItem = winItem;

                const cards = track.getElementsByClassName('item-card');
                cards[winIndex].style.borderBottom = `4px solid ${winItem[3]}`;
                cards[winIndex].innerHTML = `
                    <img class="item-img" src="${winItem[1]}" alt="">
                    <span>${winItem[0]}</span>
                `;

                const wrapperWidth = document.querySelector('.roulette-wrapper').clientWidth;
                const centerOffset = (wrapperWidth / 2) - (cardWidth / 2);
                const targetX = -(winIndex * cardWidth) + centerOffset;

                track.style.transition = 'transform 4s cubic-bezier(0.1, 0.6, 0.1, 1)';
                track.style.transform = `translateX(${targetX}px)`;

                setTimeout(() => {
                    tg.HapticFeedback.notificationOccurred('success');
                    document.getElementById('reward-image').src = winItem[1];
                    document.getElementById('reward-name').innerText = winItem[0];
                    document.getElementById('reward-card').style.borderColor = winItem[3];
                    document.getElementById('sell-button-text').innerText = `Продать за ${winItem[2]} 🪙`;
                    rewardBlock.style.display = 'block';
                    spinBtn.disabled = false;
                }, 4100);
            }, 50);
        }

        // Сохраняем выбитый предмет в инвентарь Firebase
        function claimItem() {
            if (!lastWonItem) return;
            tg.HapticFeedback.impactOccurred('light');
