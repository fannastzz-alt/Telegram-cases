<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Simulator</title>
    <!-- Подключаем Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #0e1621;
            --text-color: #ffffff;
            --hint-color: #708499;
            --button-color: #2481cc;
            --button-text: #ffffff;
            --secondary-bg: #17212b;
            --border-color: #24303f;
            --accent-gold: #f1c40f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--secondary-bg);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: var(--button-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .username {
            font-weight: 600;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .balance {
            font-weight: bold;
            color: var(--accent-gold);
            background: rgba(241, 196, 15, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(241, 196, 15, 0.3);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Навигация (вкладки) */
        .nav-tabs {
            display: flex;
            background: var(--secondary-bg);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--hint-color);
            padding: 10px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--button-color);
            color: var(--button-text);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Сетка кейсов */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding-bottom: 20px;
        }

        .case-card {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s;
        }

        .case-card:active {
            transform: scale(0.97);
        }

        .case-img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .case-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 6px;
        }

        .case-cost {
            font-size: 13px;
            color: var(--accent-gold);
            font-weight: bold;
        }

        /* Экран открытия */
        .back-btn {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .opening-case-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .opening-case-info h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Обычная рулетка */
        .roulette-container {
            position: relative;
            width: 100%;
            height: 110px;
            background: #0b1118;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .roulette-pointer {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #ff4757;
            z-index: 10;
            box-shadow: 0 0 10px #ff4757;
        }

        .roulette-track {
            display: flex;
            align-items: center;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            padding: 0 10px;
        }

        .roulette-item {
            width: 80px;
            height: 90px;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            margin: 0 3px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            text-align: center;
            padding: 4px;
            flex-shrink: 0;
        }

        .roulette-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-bottom: 4px;
        }

        .roulette-item .name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Мульти-рулетка (x5) */
        .roulettes-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            padding: 5px 0;
        }

        .roulette-wrapper-mini {
            position: relative;
            width: 100%;
            height: 50px;
            background: #0b1118;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .roulette-tape-mini {
            display: flex;
            align-items: center;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
        }

        .roulette-item-mini {
            width: 80px;
            height: 48px;
            background: var(--secondary-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .roulette-item-mini img {
            width: 38px;
            height: 38px;
            object-fit: contain;
        }

        /* Кнопки действий */
        .action-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .action-btns button {
            flex: 1;
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .action-btns button:disabled {
            background: var(--hint-color);
            opacity: 0.6;
        }

        .action-btns button:active:not(:disabled) {
            transform: scale(0.98);
        }

        /* Содержимое кейса (Лут-лист) */
        .loot-list {
            background: var(--secondary-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 12px;
        }

        .loot-list h3 {
            font-size: 14px;
            color: var(--hint-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .loot-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .loot-item-row:last-child {
            border-bottom: none;
        }

        .loot-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .loot-name img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .loot-details {
            text-align: right;
        }

        .loot-chance {
            font-size: 12px;
            color: var(--hint-color);
        }

        .loot-price {
            font-size: 13px;
            color: var(--accent-gold);
            font-weight: 500;
        }

        /* Инвентарь */
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .inventory-item-row {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .inv-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .inv-item-img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .inv-item-count {
            color: var(--hint-color);
            font-size: 12px;
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn-sell {
            background: rgba(241, 196, 15, 0.15);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-sell:active {
            background: rgba(241, 196, 15, 0.3);
        }

        .inventory-empty {
            text-align: center;
            color: var(--hint-color);
            padding: 40px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <div class="user-info">
        <div class="avatar" id="user-avatar">?</div>
        <div class="username" id="user-name">Loading...</div>
    </div>
    <div class="balance" id="user-balance">0 ★</div>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('cases')">Кейсы</button>
    <button class="tab-btn" onclick="switchTab('inventory')">Инвентарь <span id="inv-total-count">(0)</span></button>
</div>

<!-- ЭКРАН: СПИСОК КЕЙСОВ -->
<div id="cases-screen" class="screen active">
    <div class="cases-grid" id="cases-grid-container">
        <!-- Генерируется из JS -->
    </div>
</div>

<!-- ЭКРАН: ИНВЕНТАРЬ -->
<div id="inventory-screen" class="screen">
    <div id="inventory-list-container">
        <!-- Генерируется из JS -->
    </div>
</div>

<!-- ЭКРАН: ПРОКРУТКА КЕЙСА -->
<div id="opening-screen" class="screen">
    <button class="back-btn" onclick="backToMenu()">← Назад</button>
    
    <div class="opening-case-info">
        <h2 id="opening-case-title">Название кейса</h2>
    </div>

    <div class="roulette-container">
        <div class="roulette-pointer"></div>
        <div class="roulette-track" id="roulette-track">
            <!-- Элементы ленты -->
        </div>
    </div>

    <div class="action-btns">
        <button id="open-btn" onclick="startOpening(1)">Открыть 1х</button>
        <button id="open-btn-x5" onclick="startOpening(5)">Открыть 5х</button>
    </div>

    <div class="loot-list">
        <h3>Содержимое кейса</h3>
        <div id="loot-list-container">
            <!-- Список лута -->
        </div>
    </div>
</div>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Параметры пользователя (Fallback на дефолт, если открыто не в ТГ)
    const userId = tg.initDataUnsafe?.user?.id || 123456789;
    const username = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || "Детектив";

    // Инициализация Supabase клиента (замените своими URL и Ключом при деплое)
    const SUPABASE_URL = "https://your-project.supabase.co"; 
    const SUPABASE_KEY = "your-anon-key";
    let dbClient = null;

    if (SUPABASE_URL !== "https://your-project.supabase.co") {
        dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    // Предметы и их ценность
    const ITEMS = {
        "Telegram Stars x50": { price: 50 },
        "Telegram Stars x100": { price: 100 },
        "Telegram Stars x250": { price: 250 },
        "Telegram Stars x500": { price: 500 },
        "Telegram Stars x1000": { price: 1000 },
        "Telegram Stars x5000": { price: 5000 },
        "Подписка Premium 1 мес.": { price: 300 },
        "Подписка Premium 3 мес.": { price: 900 },
        "Подписка Premium 6 мес.": { price: 1500 },
        "Подписка Premium 12 мес.": { price: 2800 },
        "Утешительный приз": { price: 10 }
    };

    // Конфигурация кейсов
    const CASE_CONFIG = {
        stars_basic: {
            name: "Стартовый Кейс",
            cost: 100,
            image: "https://img.icons8.com/fluency/96/box.png",
            items: [
                ["Утешительный приз", 45],
                ["Telegram Stars x50", 35],
                ["Telegram Stars x100", 15],
                ["Telegram Stars x250", 5]
            ]
        },
        stars_premium: {
            name: "Премиум Кейс",
            cost: 500,
            image: "https://img.icons8.com/fluency/96/luxury-box.png",
            items: [
                ["Telegram Stars x100", 50],
                ["Telegram Stars x250", 30],
                ["Telegram Stars x500", 14],
                ["Подписка Premium 1 мес.", 5],
                ["Telegram Stars x1000", 1]
            ]
        },
        sub_case: {
            name: "Кейс с Подписками",
            cost: 1000,
            image: "https://img.icons8.com/fluency/96/gift.png",
            items: [
                ["Telegram Stars x250", 40],
                ["Подписка Premium 1 мес.", 35],
                ["Подписка Premium 3 мес.", 15],
                ["Подписка Premium 6 мес.", 8],
                ["Подписка Premium 12 мес.", 2]
            ]
        },
        stars_jackpot: {
            name: "Джекпот Кейс",
            cost: 2500,
            image: "https://img.icons8.com/fluency/96/treasure-chest.png",
            items: [
                ["Telegram Stars x500", 70],
                ["Telegram Stars x1000", 24],
                ["Подписка Premium 12 мес.", 5],
                ["Telegram Stars x5000", 1]
            ]
        }
    };

    // Глобальное состояние
    let userBalance = 5000; // Стартовый демо-баланс
    let userInventory = {}; // Предмет: Количество
    let selectedCaseKey = null;
    let isRolling = false;

    // Вспомогательные хелперы
    function formatStars(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    function getItemImage(name) {
        if(name.includes("Premium")) return "https://img.icons8.com/fluency/48/star.png";
        if(name.includes("x5000") || name.includes("x1000")) return "https://img.icons8.com/fluency/48/stacked-coins.png";
        if(name.includes("Stars")) return "https://img.icons8.com/fluency/48/coin.png";
        return "https://img.icons8.com/fluency/48/sad.png";
    }

    // Инициализация приложения
    async function initApp() {
        document.getElementById("user-name").textContent = username;
        document.getElementById("user-avatar").textContent = username.charAt(0).toUpperCase();
        
        // Загрузка данных из Supabase (если подключен) или LocalStorage
        if (dbClient) {
            try {
                let { data, error } = await dbClient.from('users').select('*').eq('id', userId).single();
                if (error && error.code === 'PGRST116') {
                    // Пользователь не найден, создаем запись
                    await dbClient.from('users').insert([{ id: userId, username: username, balance: userBalance, inventory: {} }]);
                } else if (data) {
                    userBalance = data.balance;
                    userInventory = data.inventory || {};
                }
            } catch (e) {
                console.error("Ошибка Supabase, переключаемся на LocalStorage:", e);
                loadFromLocalStorage();
            }
        } else {
            loadFromLocalStorage();
        }

        updateUI();
        renderCasesGrid();
    }

    function loadFromLocalStorage() {
        const localBalance = localStorage.getItem(`balance_${userId}`);
        const localInv = localStorage.getItem(`inv_${userId}`);
        if (localBalance !== null) userBalance = parseInt(localBalance);
        if (localInv !== null) userInventory = JSON.parse(localInv);
    }

    function saveUserData() {
        localStorage.setItem(`balance_${userId}`, userBalance);
        localStorage.setItem(`inv_${userId}`, JSON.stringify(userInventory));
        updateUI();

        if (dbClient) {
            dbClient.from('users').update({ balance: userBalance, inventory: userInventory }).eq('id', userId)
                .catch(e => console.error("Ошибка сохранения в БД:", e));
        }
    }

    function updateUI() {
        document.getElementById("user-balance").textContent = `${formatStars(userBalance)} ★`;
        renderInventory();
    }

    function switchTab(tab) {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));

        if (tab === 'cases') {
            document.querySelector(".tab-btn[onclick*='cases']").classList.add("active");
            document.getElementById("cases-screen").classList.add("active");
            document.getElementById("opening-screen").style.display = "none";
        } else {
            document.querySelector(".tab-btn[onclick*='inventory']").classList.add("active");
            document.getElementById("inventory-screen").classList.add("active");
            document.getElementById("opening-screen").style.display = "none";
        }
    }

    function renderCasesGrid() {
        const grid = document.getElementById("cases-grid-container");
        grid.innerHTML = "";
        for (const key in CASE_CONFIG) {
            const c = CASE_CONFIG[key];
            const card = document.createElement("div");
            card.className = "case-card";
            card.onclick = () => openCaseScreen(key);
            card.innerHTML = `
                <img class="case-img" src="${c.image}" alt="${c.name}">
                <div class="case-name">${c.name}</div>
                <div class="case-cost">${formatStars(c.cost)} ★</div>
            `;
            grid.appendChild(card);
        }
    }

    function openCaseScreen(key) {
        if (isRolling) return;
        selectedCaseKey = key;
        const c = CASE_CONFIG[key];

        document.getElementById("opening-case-title").textContent = c.name;
        document.getElementById("open-btn").textContent = `Открыть за ${formatStars(c.cost)} ★`;
        document.getElementById("open-btn-x5").textContent = `Открыть 5х за ${formatStars(c.cost * 5)} ★`;

        // Сброс и подготовка трека обычной рулетки
        const track = document.getElementById("roulette-track");
        track.style.opacity = "1";
        track.style.transition = "none";
        track.style.transform = "translate3d(0px, 0px, 0px)";
        track.innerHTML = "";

        // Набиваем базовый трек превью-айтемами
        for(let i=0; i<15; i++) {
            const randomItemName = c.items[Math.floor(Math.random() * c.items.length)][0];
            track.appendChild(createRouletteItemNode(randomItemName));
        }

        // Рендерим лут-лист
        const lootContainer = document.getElementById("loot-list-container");
        lootContainer.innerHTML = "";
        c.items.forEach(itemArr => {
            const name = itemArr[0];
            const chance = itemArr[1];
            const itemInfo = ITEMS[name] || {price: 0};
            const row = document.createElement("div");
            row.className = "loot-item-row";
            row.innerHTML = `
                <div class="loot-name">
                    <img src="${getItemImage(name)}" alt="">
                    <span>${name}</span>
                </div>
                <div class="loot-details">
                    <div class="loot-chance">${chance}%</div>
                    <div class="loot-price">${formatStars(itemInfo.price)} ★</div>
                </div>
            `;
            lootContainer.appendChild(row);
        });

        // Скрываем сетку кейсов и вкладки, показываем экран рулетки
        document.getElementById("cases-screen").classList.remove("active");
        document.getElementById("inventory-screen").classList.remove("active");
        document.getElementById("opening-screen").style.display = "block";
    }

    function createRouletteItemNode(itemName) {
        const div = document.createElement("div");
        div.className = "roulette-item";
        div.innerHTML = `
            <img src="${getItemImage(itemName)}" alt="">
            <div class="name">${itemName}</div>
        `;
        return div;
    }

    function backToMenu() {
        if (isRolling) return;
        document.getElementById("opening-screen").style.display = "none";
        // Возвращаемся на вкладку кейсов
        switchTab('cases');
    }

    function getRandomItem(itemsConfig) {
        let rand = Math.random() * 100;
        let sum = 0;
        for (let i = 0; i < itemsConfig.length; i++) {
            sum += itemsConfig[i][1];
            if (rand <= sum) return itemsConfig[i][0];
        }
        return itemsConfig[0][0];
    }

    async function startOpening(count = 1) {
        if (isRolling) return; 
        
        const caseInfo = CASE_CONFIG[selectedCaseKey];
        const totalCost = caseInfo.cost * count;

        if (userBalance < totalCost) {
            alert(`Недостаточно ⭐! Требуется ${formatStars(totalCost)} ★`);
            return;
        }

        userBalance -= totalCost;
        updateUI();

        if (dbClient) {
            try {
                await dbClient.from('users').update({ balance: userBalance }).eq('id', userId);
            } catch (e) {
                console.error("Ошибка сохранения баланса:", e);
            }
        }

        document.getElementById("open-btn").disabled = true;
        document.getElementById("open-btn-x5").disabled = true;

        if (count === 1) {
            triggerOpenCase(); 
        } else {
            startMultiRoulette(5); 
        }
    }

    function triggerOpenCase() {
        isRolling = true;
        const currentCase = CASE_CONFIG[selectedCaseKey];
        const winItem = getRandomItem(currentCase.items);

        const track = document.getElementById("roulette-track");
        track.style.transition = "none";
        track.style.transform = "translate3d(0px, 0px, 0px)";
        track.innerHTML = "";

        const itemWidth = 86; // 80px + 6px маргины (3px слева и справа)
        const winIndex = 25;  // Индекс победного элемента

        for (let i = 0; i < 35; i++) {
            let name = (i === winIndex) ? winItem : getRandomItem(currentCase.items);
            track.appendChild(createRouletteItemNode(name));
        }

        setTimeout(() => {
            track.style.transition = "transform 4s cubic-bezier(0.15, 0.85, 0.35, 1)";
            const containerWidth = document.querySelector(".roulette-container").clientWidth;
            // Смещение к центру победного элемента с легким случайным сдвигом внутри карточки
            const randShift = Math.floor(Math.random() * 40) - 20;
            const targetX = -(winIndex * itemWidth - containerWidth / 2 + itemWidth / 2) + randShift;
            track.style.transform = `translate3d(${targetX}px, 0px, 0px)`;
        }, 50);

        setTimeout(() => {
            isRolling = false;
            document.getElementById("open-btn").disabled = false;
            document.getElementById("open-btn-x5").disabled = false;
            
            // Добавляем в инвентарь
            userInventory[winItem] = (userInventory[winItem] || 0) + 1;
            saveUserData();
            
            alert(`🎉 Вы выбили: ${winItem}!`);
        }, 4100);
    }

    function startMultiRoulette(count = 5) {
        isRolling = true;
        const currentCase = CASE_CONFIG[selectedCaseKey];
        
        const singleRoulette = document.getElementById("roulette-track");
        if (singleRoulette) singleRoulette.style.opacity = "0";

        const rouletteContainer = document.querySelector(".roulette-container");
        
        const oldMulti = document.querySelector(".roulettes-container");
        if (oldMulti) oldMulti.remove();

        const roulettesWrap = document.createElement("div");
        roulettesWrap.className = "roulettes-container";
        roulettesContainer.appendChild(roulettesWrap);

        const winItems = [];
        const winIndex = 25;
        const itemWidth = 81; // Подгонка под mini-айтемы (ширина + границы)

        for (let r = 0; r < count; r++) {
            const winItemName = getRandomItem(currentCase.items);
            winItems.push(winItemName);

            const wrapper = document.createElement("div");
            wrapper.className = "roulette-wrapper-mini";

            const tape = document.createElement("div");
            tape.className = "roulette-tape-mini";
            tape.id = `tape-${r}`;

            for (let i = 0; i < 35; i++) {
                const itemName = (i === winIndex) ? winItemName : getRandomItem(currentCase.items);
                const itemImg = getItemImage(itemName);

                const itemDiv = document.createElement("div");
                itemDiv.className = "roulette-item-mini";
                itemDiv.innerHTML = `<img src="${itemImg}" alt="${itemName}">`;
                tape.appendChild(itemDiv);
            }
            wrapper.appendChild(tape);
            roulettesWrap.appendChild(wrapper);

            setTimeout(() => {
                tape.style.transition = "transform 4s cubic-bezier(0.15, 0.85, 0.35, 1)";
                const containerWidth = wrapper.clientWidth;
                const randShift = Math.floor(Math.random() * 30) - 15;
                const targetX = -(winIndex * itemWidth - containerWidth / 2 + itemWidth / 2) + randShift;
                tape.style.transform = `translate3d(${targetX}px, 0px, 0px)`;
            }, 50);
        }

        setTimeout(() => {
            isRolling = false;
            document.getElementById("open-btn").disabled = false;
            document.getElementById("open-btn-x5").disabled = false;

            // Начисляем все выпавшие предметы
            winItems.forEach(item => {
                userInventory[item] = (userInventory[item] || 0) + 1;
            });
            saveUserData();

            alert(`🎉 Ваши награды:\n${winItems.map(i => "• " + i).join("\n")}`);
            
            // Возвращаем обычную рулетку
            roulettesWrap.remove();
            if (singleRoulette) singleRoulette.style.opacity = "1";
        }, 4200);
    }

    function renderInventory() {
        const container = document.getElementById("inventory-list-container");
        const totalCountSpan = document.getElementById("inv-total-count");
        container.innerHTML = "";

        let totalItems = 0;
        let hasItems = false;

        for (const name in userInventory) {
            const count = userInventory[name];
            if (count <= 0) continue;
            hasItems = true;
            totalItems += count;

            const itemInfo = ITEMS[name] || {price: 0};
            const row = document.createElement("div");
            row.className = "inventory-item-row";
            row.innerHTML = `
                <div class="inv-item-info">
                    <img class="inv-item-img" src="${getItemImage(name)}" alt="">
                    <span>${name}</span>
                    <span class="inv-item-count">${count} шт.</span>
                </div>
                <button class="btn-sell" onclick="sellItem('${name}')">Продать за ${formatStars(itemInfo.price)} ★</button>
            `;
            container.appendChild(row);
        }

        totalCountSpan.textContent = `(${totalItems})`;

        if (!hasItems) {
            container.innerHTML = `<div class="inventory-empty">Здесь пока ничего нет. Откройте свой первый кейс!</div>`;
        }
    }

    function sellItem(name) {
        if (isRolling) return;
        if (!userInventory[name] || userInventory[name] <= 0) return;

        const itemInfo = ITEMS[name] || {price: 0};
        
        userInventory[name] -= 1;
        userBalance += itemInfo.price;

        saveUserData();
    }

    // Запуск приложения при полной загрузке страницы
    window.onload = initApp;
</script>
</body>
</html>
