        /* Контейнер, чтобы кнопки встали красиво в ряд */
        .open-buttons-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            width: 100%;
            max-width: 450px;
            margin: 15px auto;
        }

        /* Стили для кнопки x5 */
        .btn-x5 {
            background: #f59e0b !important; /* Оранжевый/золотой цвет */
            color: #ffffff !important;
        }
        .btn-x5:hover {
            background: #d97706 !important;
        }

        /* Отключение кнопок при кручении */
        .btn:disabled, .btn-x5:disabled {
            background: #4b5563 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Стили для режима мульти-рулетки (x5) */
        .roulettes-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
            background: #0a0a0c;
            padding: 10px;
            box-sizing: border-box;
        }

        .roulette-wrapper-mini {
            position: relative;
            width: 100%;
            height: 80px;
            overflow: hidden;
            border: 2px solid #38bdf8;
            background: #121216;
            border-radius: 12px;
        }

        .roulette-wrapper-mini::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ff4a4a;
            z-index: 10;
            box-shadow: 0 0 10px #ff4a4a;
            transform: translateX(-50%);
        }

        .roulette-tape-mini {
            display: flex;
            transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1);
            will-change: transform;
        }

        .roulette-item-mini {
            min-width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e1e24;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .roulette-item-mini img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }
        
        * { box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body {
            background-color: #0a0a0c; /* Угольно-черный фон */
            color: #ffffff;
            margin: 0;
            padding: 16px 16px 95px 16px;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        /* Премиальная шапка */
        .header {
            background: #121216;
            padding: 14px 18px;
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid #1f1f24;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        #username-display { font-size: 0.95rem; color: #8e8e93; font-weight: 500; }
        .balance { color: #ffffff; font-weight: 700; font-size: 1.15rem; }
        .balance span { color: #eab308; } /* Золотые звезды */

        h2 { 
            font-size: 1.4rem; 
            margin: 20px 0 16px 0; 
            color: #ffffff; 
            font-weight: 700;
            letter-spacing: -0.3px;
            text-align: center;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Новая аккуратная сетка кейсов (2 в ряд) */
        .case-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding-bottom: 20px;
        }
        
        /* Стили для увеличенных картинок кейсов в главном меню */
        .case-card-img {
            width: 100%;
            max-width: 140px; 
            height: 120px;    
            object-fit: contain;
            margin: 5px auto 12px auto;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5)); 
            transition: transform 0.2s ease;
        }
        .case-card:active .case-card-img {
            transform: scale(1.05); 
        }
        
        .case-card {
            background: #121216;
            border: 1px solid #1f1f24;
            border-radius: 24px;
            padding: 20px 14px 16px 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 180px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .case-card:active {
            transform: scale(0.96);
            border-color: rgba(56, 189, 248, 0.4);
        }
        .case-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 8px 0;
            color: #efeff4;
            line-height: 1.2;
        }
        .case-cost {
            background: #1c1c24;
            border: 1px solid #2d2d38;
            color: #38bdf8;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 8px 0;
            border-radius: 14px;
            width: 100%;
            text-align: center;
        }

        /* Инвентарь */
        .inventory-list { display: flex; flex-direction: column; gap: 10px; }
        .inventory-empty { color: #8e8e93; text-align: center; font-size: 0.95rem; padding: 40px 0; }
        .inventory-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #121216;
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px solid #1f1f24;
        }
        .inv-item-info { display: flex; align-items: center; gap: 12px; font-size: 0.95rem; font-weight: 500;}
        .inv-item-img {
            width: 36px !important;
            height: 36px !important;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        .inv-item-count { color: #38bdf8; font-weight: 700; background: rgba(56, 189, 248, 0.1); padding: 2px 8px; border-radius: 8px; font-size: 0.8rem; }
        .btn-sell {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 0.85rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .coming-soon { text-align: center; padding: 60px 20px; color: #8e8e93; }

        /* Кнопки */
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 1rem;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn:disabled { background: #2c2c35; color: #6e6e73; box-shadow: none; }
        .btn-secondary { background: #1c1c24; border: 1px solid #2d2d38; width: auto; padding: 8px 16px; font-size: 0.85rem; margin: 0; float: left; box-shadow: none; }

        /* Обновленная рулетка с визуальным увеличением */
        .roulette-container {
            background: #121216;
            border: 1px solid #1f1f24;
            border-radius: 20px;
            margin: 25px 0; 
            position: relative;
            overflow: hidden;
            height: 95px; 
            display: flex;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            transform: scale(1.15);
            transform-origin: center;
        }
        .roulette-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #38bdf8;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 12px #38bdf8;
            border-radius: 2px;
        }
        .roulette-track { display: flex; position: absolute; left: 0; transform: translate3d(0px, 0px, 0px); will-change: transform; }
        .roulette-item {
            width: 80px; 
            height: 75px; 
            background: #1c1c24;
            border: 1px solid #2d2d38;
            margin: 0 3px; 
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem; 
            padding: 4px;
            text-align: center;
            flex-shrink: 0;
        }
        .roulette-item img { 
            width: 42px !important; 
            height: 42px !important; 
            object-fit: contain; 
            margin-bottom: 2px; 
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }
        .roulette-item .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; color: #d1d1d6; font-weight: 500; }

        /* Списки содержимого */
        .loot-info-section { margin-top: 28px; }
        .loot-list { background: #121216; border-radius: 20px; padding: 8px; border: 1px solid #1f1f24; }
        .loot-item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #1f1f24; font-size: 0.9rem; }
        .loot-item-row:last-child { border-bottom: none; }
        .loot-name { font-weight: 500; display: flex; align-items: center; gap: 10px; color: #ffffff; }
        .loot-name img { width: 30px !important; height: 30px !important; object-fit: contain; }
        .loot-details { text-align: right; }
        .loot-chance { color: #34c759; font-weight: 700; font-size: 0.85rem; }
        .loot-price { color: #8e8e93; font-size: 0.8rem; margin-top: 2px; }

        /* Нижнее меню */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(18, 18, 22, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom, 0px)) 0;
            z-index: 1000;
            box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
        }
        .tab-button {
            background: none;
            border: none;
            color: #8e8e93;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            transition: all 0.2s;
        }
        .tab-button .tab-icon { font-size: 1.4rem; margin-bottom: 4px; transition: transform 0.2s; }
        .tab-button.active { color: #ffffff; }
        .tab-button.active .tab-icon { transform: scale(1.1); }

        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>

<div class="container">
    <div class="header">
        <div id="username-display">Синхронизация...</div>
        <div class="balance">Баланс: <span id="balance-value">0</span> ⭐</div>
    </div>

    <!-- ВКЛАДКА 1: КЕЙСЫ -->
    <div id="cases-tab" class="tab-content active">
        <div id="menu-screen">
            <h2>📦 Выберите кейс</h2>
            <div class="case-grid" id="case-grid-container"></div>
        </div>

        <div id="opening-screen" style="display: none;">
            <div class="clearfix" style="margin-bottom: 10px;">
                <button class="btn btn-secondary" onclick="backToMenu()">↩️ Назад</button>
            </div>
            <h2 id="current-case-name" style="margin-top: 5px;">Название кейса</h2>
            
            <div class="roulette-container">
                <div class="roulette-track" id="roulette-track"></div>
            </div>
            
            <div class="open-buttons-container">
                <button class="btn" id="open-btn" onclick="startOpening(1)">Открыть кейс</button>
                <button class="btn btn-x5" id="open-btn-x5" onclick="startOpening(5)">Открыть x5</button>
            </div>
            <div class="loot-info-section">
                <h3 style="font-size: 1rem; color: #94a3b8; padding-left: 4px; margin-bottom: 8px;">Содержимое кейса:</h3>
                <div class="loot-list" id="loot-list-container"></div>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА 2: ИНВЕНТАРЬ -->
    <div id="inventory-tab" class="tab-content">
        <h2>🎒 Ваш инвентарь <span id="inv-total-count" style="font-size: 0.9rem; color: #64748b; font-weight: normal;">(0 шт.)</span></h2>
        <div class="inventory-list" id="inventory-list-container">
            <div class="inventory-empty">Здесь пока ничего нет. Откройте свой первый кейс!</div>
        </div>
    </div>

    <!-- ВКЛАДКА 3: БУДУЩИЕ ФИЧИ -->
    <div id="future-tab" class="tab-content">
        <h2>✨ Новые возможности</h2>
        <div class="coming-soon">
            <div style="font-size: 3rem; margin-bottom: 10px;">🛠️</div>
            <p style="font-size: 1.1rem; color: #f1f5f9; margin: 5px 0;">Раздел находится в разработке</p>
            <p style="font-size: 0.85rem;">Скоро сюда добавится система промокодов, ежедневные награды и лидерборды!</p>
        </div>
    </div>

    <nav class="tab-bar" id="bottom-tab-bar">
        <button class="tab-button active" onclick="switchTab('cases-tab')">
            <span class="tab-icon">📦</span>
            <span>Кейсы</span>
        </button>
        <button class="tab-button" onclick="switchTab('inventory-tab')">
            <span class="tab-icon">🎒</span>
            <span>Инвентарь</span>
        </button>
        <button class="tab-button" onclick="switchTab('future-tab')">
            <span class="tab-icon">✨</span>
            <span>Скоро</span>
        </button>
    </nav>
</div>

    function formatStars(num) {
        if (!num) return "0";
        let absNum = Math.abs(num);
        if (absNum >= 1e12) return (num / 1e12).toFixed(1) + "Т";
        if (absNum >= 1e9) return (num / 1e9).toFixed(1) + "Б";
        if (absNum >= 1e6) return (num / 1e6).toFixed(1) + "М";
        if (absNum >= 1e3) return (num / 1e3).toFixed(1) + "к";
        return num.toString();
    }

    function getItemImage(itemName) {
        return ITEMS[itemName] && ITEMS[itemName].img ? ITEMS[itemName].img : DEFAULT_IMG;
    }

    function switchTab(tabId) {
        if (isRolling) return;

        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
        });
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.classList.remove('active');
        });

        document.getElementById(tabId).classList.add('active');
        
        const btnIndex = tabId === 'cases-tab' ? 0 : tabId === 'inventory-tab' ? 1 : 2;
        document.getElementById('bottom-tab-bar').children[btnIndex].classList.add('active');

        if(tabId === 'inventory-tab') {
            renderInventory();
        }
    }

    function initApp() {
        // Пробуем взять данные из Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = tg.initDataUnsafe.user.id.toString();
                username = tg.initDataUnsafe.user.first_name || "Gamer";
            }
        }
        document.getElementById("username-display").textContent = username;
        
        renderCaseGrid();
        loadUserData();
    }

    async function loadUserData() {
        if (dbClient) {
            try {
                let { data, error } = await dbClient.from('users').select('*').eq('id', userId).single();
                if (error && error.code === 'PGRST116') {
                    // Создаем юзера, если его нет
                    const { data: newUser, error: createError } = await dbClient
                        .from('users')
                        .insert([{ id: userId, username: username, balance: 5000, inventory: {} }])
                        .select().single();
                    if (!createError && newUser) data = newUser;
                }
                if (data) {
                    userBalance = data.balance;
                    userInventory = data.inventory || {};
                }
            } catch(e) {
                console.error("Ошибка синхронизации с Supabase:", e);
            }
        }
        updateUI();
    }

    async function saveUserData() {
        if (dbClient) {
            try {
                await dbClient.from('users').update({ balance: userBalance, inventory: userInventory }).eq('id', userId);
            } catch (e) {
                console.error("Ошибка сохранения в БД:", e);
            }
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById("balance-value").textContent = formatStars(userBalance);
    }

    function renderCaseGrid() {
        const container = document.getElementById("case-grid-container");
        container.innerHTML = "";
        for (const key in CASE_CONFIG) {
            const c = CASE_CONFIG[key];
            const card = document.createElement("div");
            card.className = "case-card";
            card.onclick = () => selectCase(key);
            card.innerHTML = `
                <img class="case-card-img" src="${c.image}" alt="${c.name}">
                <h3>${c.name}</h3>
                <div class="case-cost">${c.cost === 0 ? "БЕСПЛАТНО" : formatStars(c.cost) + " ★"}</div>
            `;
            container.appendChild(card);
        }
    }

    function selectCase(key) {
        if (isRolling) return;
        selectedCaseKey = key;
        const c = CASE_CONFIG[key];
        document.getElementById("current-case-name").textContent = c.name;
        
        // Очищаем старые мульти-рулетки
        const oldMulti = document.querySelector(".roulettes-container");
        if (oldMulti) oldMulti.remove();
        
        const track = document.getElementById("roulette-track");
        track.style.opacity = "1";
        track.style.transition = "none";
        track.style.transform = "translate3d(0px, 0px, 0px)";
        track.innerHTML = "";

        // Набиваем базовый трек превью-айтемами
        for(let i=0; i<15; i++) {
            const randomItemName = c.items[Math.floor(Math.random() * c.items.length)][0];
            track.appendChild(createRouletteItemNode(randomItemName));
        }

        // Рендерим лут-лист
        const lootContainer = document.getElementById("loot-list-container");
        lootContainer.innerHTML = "";
        c.items.forEach(itemArr => {
            const name = itemArr[0];
            const chance = itemArr[1];
            const itemInfo = ITEMS[name] || {price: 0};
            const row = document.createElement("div");
            row.className = "loot-item-row";
            row.innerHTML = `
                <div class="loot-name">
                    <img src="${getItemImage(name)}" alt="">
                    <span>${name}</span>
                </div>
                <div class="loot-details">
                    <div class="loot-chance">${chance}%</div>
                    <div class="loot-price">${formatStars(itemInfo.price)} ★</div>
                </div>
            `;
            lootContainer.appendChild(row);
        });

        document.getElementById("menu-screen").style.display = "none";
        document.getElementById("opening-screen").style.display = "block";
    }

    function createRouletteItemNode(itemName) {
        const div = document.createElement("div");
        div.className = "roulette-item";
        div.innerHTML = `
            <img src="${getItemImage(itemName)}" alt="">
            <div class="name">${itemName}</div>
        `;
        return div;
    }

    function backToMenu() {
        if (isRolling) return;
        document.getElementById("opening-screen").style.display = "none";
        document.getElementById("menu-screen").style.display = "map";
        document.getElementById("menu-screen").style.display = "block";
    }

    function getRandomItem(itemsConfig) {
        let rand = Math.random() * 100;
        let sum = 0;
        for (let i = 0; i < itemsConfig.length; i++) {
            sum += itemsConfig[i][1];
            if (rand <= sum) return itemsConfig[i][0];
        }
        return itemsConfig[0][0];
    }

    async function startOpening(count = 1) {
        if (isRolling) return; 
        
        const caseInfo = CASE_CONFIG[selectedCaseKey];
        const totalCost = caseInfo.cost * count;

        if (userBalance < totalCost) {
            alert(`Недостаточно ⭐! Требуется ${formatStars(totalCost)} ★`);
            return;
        }

        userBalance -= totalCost;
        updateUI();

        if (dbClient) {
            try {
                await dbClient.from('users').update({ balance: userBalance }).eq('id', userId);
            } catch (e) {
                console.error("Ошибка сохранения баланса:", e);
            }
        }

        document.getElementById("open-btn").disabled = true;
        document.getElementById("open-btn-x5").disabled = true;

        if (count === 1) {
            triggerOpenCase(); 
        } else {
            startMultiRoulette(5); 
        }
    }

    function triggerOpenCase() {
        isRolling = true;
        const currentCase = CASE_CONFIG[selectedCaseKey];
        const winItem = getRandomItem(currentCase.items);

        const track = document.getElementById("roulette-track");
        track.style.transition = "none";
        track.style.transform = "translate3d(0px, 0px, 0px)";
        track.innerHTML = "";

        const itemWidth = 86; // 80px + 6px маргины
        const winIndex = 25;  // Индекс победного элемента

        for (let i = 0; i < 35; i++) {
            let name = (i === winIndex) ? winItem : getRandomItem(currentCase.items);
            track.appendChild(createRouletteItemNode(name));
        }

        setTimeout(() => {
            track.style.transition = "transform 4s cubic-bezier(0.15, 0.85, 0.35, 1)";
            const containerWidth = document.querySelector(".roulette-container").clientWidth;
            // Смещение к центру победного элемента с легким случайным сдвигом внутри карточки
            const randShift = Math.floor(Math.random() * 40) - 20;
            const targetX = -(winIndex * itemWidth - containerWidth / 2 + itemWidth / 2) + randShift;
            track.style.transform = `translate3d(${targetX}px, 0px, 0px)`;
        }, 50);

        setTimeout(() => {
            isRolling = false;
            document.getElementById("open-btn").disabled = false;
            document.getElementById("open-btn-x5").disabled = false;
            
            // Добавляем в инвентарь
            userInventory[winItem] = (userInventory[winItem] || 0) + 1;
            saveUserData();
            
            alert(`🎉 Вы выбили: ${winItem}!`);
        }, 4100);
    }

    function startMultiRoulette(count = 5) {
        isRolling = true;
        const currentCase = CASE_CONFIG[selectedCaseKey];
        
        const singleRoulette = document.getElementById("roulette-track");
        if (singleRoulette) singleRoulette.style.opacity = "0";

        const rouletteContainer = document.querySelector(".roulette-container");
        
        const oldMulti = document.querySelector(".roulettes-container");
        if (oldMulti) oldMulti.remove();

        const roulettesWrap = document.createElement("div");
        roulettesWrap.className = "roulettes-container";
        roulettesContainer.appendChild(roulettesWrap);

        const winItems = [];
        const winIndex = 25;
        const itemWidth = 81; // 80px + 1px border

        for (let r = 0; r < count; r++) {
            const winItemName = getRandomItem(currentCase.items);
            winItems.push(winItemName);

            const wrapper = document.createElement("div");
            wrapper.className = "roulette-wrapper-mini";

            const tape = document.createElement("div");
            tape.className = "roulette-tape-mini";
            tape.id = `tape-${r}`;

            for (let i = 0; i < 35; i++) {
                const itemName = (i === winIndex) ? winItemName : getRandomItem(currentCase.items);
                const itemImg = getItemImage(itemName);

                const itemDiv = document.createElement("div");
                itemDiv.className = "roulette-item-mini";
                itemDiv.innerHTML = `<img src="${itemImg}" alt="${itemName}">`;
                tape.appendChild(itemDiv);
            }
            wrapper.appendChild(tape);
            roulettesWrap.appendChild(wrapper);

            setTimeout(() => {
                tape.style.transition = "transform 4s cubic-bezier(0.15, 0.85, 0.35, 1)";
                const containerWidth = wrapper.clientWidth;
                const randShift = Math.floor(Math.random() * 30) - 15;
                const targetX = -(winIndex * itemWidth - containerWidth / 2 + itemWidth / 2) + randShift;
                tape.style.transform = `translate3d(${targetX}px, 0px, 0px)`;
            }, 50);
        }

        setTimeout(() => {
            isRolling = false;
            document.getElementById("open-btn").disabled = false;
            document.getElementById("open-btn-x5").disabled = false;

            // Начисляем все выпавшие предметы
            winItems.forEach(item => {
                userInventory[item] = (userInventory[item] || 0) + 1;
            });
            saveUserData();

            alert(`🎉 Ваши награды:\n${winItems.map(i => "• " + i).join("\n")}`);
            
            // Возвращаем обычную рулетку
            roulettesWrap.remove();
            if (singleRoulette) singleRoulette.style.opacity = "1";
        }, 4200);
    }

    function renderInventory() {
        const container = document.getElementById("inventory-list-container");
        const totalCountSpan = document.getElementById("inv-total-count");
        container.innerHTML = "";

        let totalItems = 0;
        let hasItems = false;

        for (const name in userInventory) {
            const count = userInventory[name];
            if (count <= 0) continue;
            hasItems = true;
            totalItems += count;

            const itemInfo = ITEMS[name] || {price: 0};
            const row = document.createElement("div");
            row.className = "inventory-item-row";
            row.innerHTML = `
                <div class="inv-item-info">
                    <img class="inv-item-img" src="${getItemImage(name)}" alt="">
                    <span>${name}</span>
                    <span class="inv-item-count">${count} шт.</span>
                </div>
                <button class="btn-sell" onclick="sellItem('${name}')">Продать за ${formatStars(itemInfo.price)} ★</button>
            `;
            container.appendChild(row);
        }

        totalCountSpan.textContent = `(${totalItems} шт.)`;

        if (!hasItems) {
            container.innerHTML = `<div class="inventory-empty">Здесь пока ничего нет. Откройте свой первый кейс!</div>`;
        }
    }

    function sellItem(name) {
        if (isRolling) return;
        if (!userInventory[name] || userInventory[name] <= 0) return;

        const itemInfo = ITEMS[name] || {price: 0};
        
        userInventory[name] -= 1;
        userBalance += itemInfo.price;

        saveUserData();
        renderInventory();
    }

    // Запуск приложения
    window.onload = initApp;
