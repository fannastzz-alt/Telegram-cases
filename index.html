    <title>Telegram Stars Case Opener</title>

        /* Контейнер, чтобы кнопки встали красиво в ряд */
.open-buttons-container {
    display: flex;
    gap: 12px;
    justify-content: center;
    width: 100%;
    max-width: 450px;
    margin: 15px auto;
}

/* Стили для кнопки x5 */
.btn-x5 {
    background: #f59e0b !important; /* Оранжевый/золотой цвет */
    color: #ffffff !important;
}
.btn-x5:hover {
    background: #d97706 !important;
}

/* Отключение кнопок при кручении */
.btn:disabled, .btn-x5:disabled {
    background: #4b5563 !important;
    cursor: not-allowed;
    opacity: 0.6;
}

/* Стили для режима мульти-рулетки (x5) */
.roulettes-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
    max-width: 600px;
    margin: 20px auto;
}

.roulette-wrapper-mini {
    position: relative;
    width: 100%;
    height: 80px;
    overflow: hidden;
    border: 2px solid #38bdf8;
    background: #121216;
    border-radius: 12px;
}

.roulette-wrapper-mini::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 4px;
    background: #ff4a4a;
    z-index: 10;
    box-shadow: 0 0 10px #ff4a4a;
    transform: translateX(-50%);
}

.roulette-tape-mini {
    display: flex;
    transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1);
    will-change: transform;
}

.roulette-item-mini {
    min-width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1e1e24;
    border-right: 1px solid rgba(255, 255, 255, 0.05);
}

.roulette-item-mini img {
    width: 50px;
    height: 50px;
    object-fit: contain;
}
        
        * { box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body {
            background-color: #0a0a0c; /* Угольно-черный фон как на референсах */
            color: #ffffff;
            margin: 0;
            padding: 16px 16px 95px 16px;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 480px; margin: 0 auto; }

        .header {
            background: #121216;
            padding: 14px 18px;
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid #1f1f24;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        #username-display { font-size: 0.95rem; color: #8e8e93; font-weight: 500; }
        .balance { color: #ffffff; font-weight: 700; font-size: 1.15rem; }
        .balance span { color: #eab308; } /* Золотые звезды */

        h2 { 
            font-size: 1.4rem; 
            margin: 20px 0 16px 0; 
            color: #ffffff; 
            font-weight: 700;
            letter-spacing: -0.3px;
            text-align: center;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Новая аккуратная сетка кейсов (2 в ряд) */
        .case-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding-bottom: 20px;
        }
        
        /* Стили для увеличенных картинок кейсов в главном меню */
        .case-card-img {
            width: 100%;
            max-width: 140px; /* Увеличили ширину, чтобы кейс стал больше */
            height: 120px;    /* Увеличили высоту для сочности */
            object-fit: contain;
            margin: 5px auto 12px auto;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5)); /* Чуть углубили тень для объема */
            transition: transform 0.2s ease;
        }
        .case-card:active .case-card-img {
            transform: scale(1.05); /* Легкий интерактивный зум при тапе */
        }
        
        .case-card {
            background: #121216;
            border: 1px solid #1f1f24;
            border-radius: 24px;
            padding: 20px 14px 16px 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 180px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .case-card:active {
            transform: scale(0.96);
            border-color: rgba(56, 189, 248, 0.4);
        }
        .case-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 8px 0;
            color: #efeff4;
            line-height: 1.2;
        }
        .case-cost {
            background: #1c1c24;
            border: 1px solid #2d2d38;
            color: #38bdf8;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 8px 0;
            border-radius: 14px;
            width: 100%;
            text-align: center;
        }

        /* Инвентарь */
        .inventory-list { display: flex; flex-direction: column; gap: 10px; }
        .inventory-empty { color: #8e8e93; text-align: center; font-size: 0.95rem; padding: 40px 0; }
        .inventory-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #121216;
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px solid #1f1f24;
        }
        .inv-item-info { display: flex; align-items: center; gap: 12px; font-size: 0.95rem; font-weight: 500;}
        .inv-item-img {
            width: 36px !important;
            height: 36px !important;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        .inv-item-count { color: #38bdf8; font-weight: 700; background: rgba(56, 189, 248, 0.1); padding: 2px 8px; border-radius: 8px; font-size: 0.8rem; }
        .btn-sell {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 0.85rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .coming-soon { text-align: center; padding: 60px 20px; color: #8e8e93; }

        /* Кнопки */
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 1rem;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn:disabled { background: #2c2c35; color: #6e6e73; box-shadow: none; }
        .btn-secondary { background: #1c1c24; border: 1px solid #2d2d38; width: auto; padding: 8px 16px; font-size: 0.85rem; margin: 0; float: left; box-shadow: none; }

        /* Обновленная рулетка с визуальным увеличением */
        .roulette-container {
            background: #121216;
            border: 1px solid #1f1f24;
            border-radius: 20px;
            margin: 25px 0; /* Немного увеличили отступы вокруг рулетки */
            position: relative;
            overflow: hidden;
            height: 95px; 
            display: flex;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            
            /* Вот этот трюк: увеличиваем рулетку визуально в 1.15 раз */
            transform: scale(1.15);
            transform-origin: center;
        }
        .roulette-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #38bdf8;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 12px #38bdf8;
            border-radius: 2px;

        .loot-item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #1f1f24; font-size: 0.9rem; }

        .loot-name { font-weight: 500; display: flex; align-items: center; gap: 10px; color: #ffffff; }

        .clearfix::after { content: ""; clear: both; display: table; }

    function formatStars(num) {
        if (!num) return "0";
        let absNum = Math.abs(num);
        if (absNum >= 1e12) return (num / 1e12).toFixed(1) + "Т";
        if (absNum >= 1e9) return (num / 1e9).toFixed(1) + "Б";
        if (absNum >= 1e6) return (num / 1e6).toFixed(1) + "М";
        if (absNum >= 1e3) return (num / 1e3).toFixed(1) + "к";
        return num.toString();
    }

    function switchTab(tabId) {
        if (isRolling) return;

        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
        });
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.classList.remove('active');
        });

        document.getElementById(tabId).classList.add('active');
        
        const btnIndex = tabId === 'cases-tab' ? 0 : tabId === 'inventory-tab' ? 1 : 2;
        document.getElementById('bottom-tab-bar').children[btnIndex].classList.add('active');

        if(tabId === 'inventory-tab') {
            renderInventory();
        }
    }

    async function loadUserData() {
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            const tgData = window.Telegram.WebApp.initDataUnsafe;
            if (tgData && tgData.user) {
                userId = tgData.user.id.toString();
                username = tgData.user.username || tgData.user.first_name || "Gamer";
            }
        }
        document.getElementById("username-display").innerText = "@" + username;

        if (!dbClient) {
            document.getElementById("username-display").innerText = "Тестовый режим (Без БД)";
            userBalance = 500000; 
            userInventory = {};
            updateUI();
            renderMenu();
            renderInventory();
            return;
        }

        try {
            let { data, error } = await dbClient.from('users').select('*').eq('id', userId).maybeSingle();
            if (error) throw error;

            if (!data) {
                const newUser = { id: userId, username: username, balance: 5000, inventory: {} };
                await dbClient.from('users').insert([newUser]);
                userBalance = 5000;
                userInventory = {};
            } else {
                userBalance = data.balance || 0;
                userInventory = data.inventory || {};
            }
            updateUI();
        } catch (e) {
            console.error(e);
            document.getElementById("username-display").innerText = "БД недоступна (Автономно)";
            userBalance = 500000;
            updateUI();
        } finally {
            renderMenu();
            renderInventory();
        }
    }

    function renderInventory() {
        const container = document.getElementById("inventory-list-container");
        const countDisplay = document.getElementById("inv-total-count");
        container.innerHTML = "";

        const itemKeys = Object.keys(userInventory).filter(k => userInventory[k] > 0);
        let totalItems = 0;

        if (itemKeys.length === 0) {
            container.innerHTML = '<div class="inventory-empty">Здесь пока ничего нет. Откройте свой первый кейс!</div>';
            countDisplay.innerText = "(0 шт.)";
            return;
        }

        itemKeys.forEach(name => {
            const count = userInventory[name];
            totalItems += count;
            const price = ITEMS[name] ? ITEMS[name].price : 0;
            const itemImg = ITEMS[name] ? ITEMS[name].img : DEFAULT_IMG;

            const row = document.createElement("div");
            row.className = "inventory-item-row";
            row.innerHTML = `
                <div class="inv-item-info">
                    <img src="${itemImg}" class="inv-item-img" alt="">
                    <span>${name}</span>

                </div>
                <button class="btn-sell" onclick="sellItem('${name}')">Продать за ${formatStars(price)} ⭐</button>

            container.appendChild(row);
        });

        countDisplay.innerText = `(${totalItems} шт.)`;
    }

    async function sellItem(name) {
        if (isRolling || !userInventory[name] || userInventory[name] <= 0) return;
        
        const price = ITEMS[name] ? ITEMS[name].price : 0;
        
        userInventory[name]--;
        if (userInventory[name] === 0) {
            delete userInventory[name];
        }
        userBalance += price;
        
        updateUI();
        renderInventory();

        if (dbClient) {
            await dbClient.from('users').update({ balance: userBalance, inventory: userInventory }).eq('id', userId);
        }
    }

    function resetRoulette(itemsArray) {
        const track = document.getElementById("roulette-track");
        track.style.transition = "none";
        track.style.transform = "translate3d(0px, 0px, 0px)";
        track.innerHTML = "";

        for (let i = 0; i < 35; i++) {
            const randomName = itemsArray[Math.floor(Math.random() * itemsArray.length)][0];
            track.appendChild(createItemNode(randomName));
        }
    }

    function createItemNode(name) {
        const node = document.createElement("div");
        node.className = "roulette-item";
        
        const itemImg = ITEMS[name] ? ITEMS[name].img : DEFAULT_IMG;

        node.innerHTML = `
            <img src="${itemImg}" alt="">
            <div class="name">${name}</div>
        `;
        return node;
    }

    function getRandomItem(itemsArray) {
        let totalWeight = itemsArray.reduce((sum, item) => sum + item[1], 0);
        let randomNum = Math.random() * totalWeight;
        for (let i = 0; i < itemsArray.length; i++) {
            if (randomNum < itemsArray[i][1]) return itemsArray[i][0];
            randomNum -= itemsArray[i][1];
        }
        return itemsArray[0][0];
    }

    async function triggerOpenCase() {
        if (isRolling || !selectedCaseKey) return;
        const caseInfo = CASE_CONFIG[selectedCaseKey];

        if (userBalance < caseInfo.cost) {
            alert("Недостаточно звёзд!");
            return;
        }

        isRolling = true;
        document.getElementById("open-btn").disabled = true;

        const track = document.getElementById("roulette-track");
        track.style.transition = "none";
        track.style.transform = "translate3d(0px, 0px, 0px)";
        track.offsetHeight; 

        const winningItem = getRandomItem(caseInfo.items);

        userBalance -= caseInfo.cost;
        userInventory[winningItem] = (userInventory[winningItem] || 0) + 1;
        updateUI();

        if (dbClient) {
            const { error } = await dbClient.from('users').update({ balance: userBalance, inventory: userInventory }).eq('id', userId);
            if (error) {
                alert("Ошибка сохранения данных!");
                isRolling = false;
                document.getElementById("open-btn").disabled = false;
                return;
            }
        }

        const itemsNodes = track.children;
        for(let i=0; i<35; i++) {
            if(i === 28) {
                track.replaceChild(createItemNode(winningItem), itemsNodes[i]);
            } else {
                const randName = caseInfo.items[Math.floor(Math.random() * caseInfo.items.length)][0];
                track.replaceChild(createItemNode(randName), itemsNodes[i]);
            }
        }

        const itemWidth = 86; 
        const containerWidth = document.querySelector('.roulette-container').offsetWidth;
        const centerOffset = (containerWidth / 2) - (itemWidth / 2);
        const finalX = -(28 * itemWidth) + centerOffset;

        track.style.transition = "transform 4s cubic-bezier(0.1, 0.85, 0.15, 1)";
        track.style.transform = `translate3d(${finalX}px, 0px, 0px)`;

        setTimeout(() => {
            isRolling = false;
            document.getElementById("open-btn").disabled = false;
            if(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.showAlert) {
                window.Telegram.WebApp.showAlert(`Вы выбили: ${winningItem}!`);
            } else {
                alert(`Вы выбили: ${winningItem}!`);
            }
        }, 4200);

            const item = (i === 30) ? winItem : getRandomItem(currentCase.items);
            // Получаем картинку предмета (или ставим заглушку)
            const itemImg = typeof getItemImage === 'function' ? getItemImage(item[0]) : "https://i.ibb.co/365879/image.jpg";

            tapeHTML += `
                <div class="roulette-item-mini">
                    <img src="${itemImg}" alt="${item[0]}">
                </div>
            `;
        }

        tape.innerHTML = tapeHTML;
        wrapper.appendChild(tape);
        roulettesWrap.appendChild(wrapper);

        // Запускаем анимацию прокрутки с легким каскадным сдвигом
        setTimeout(() => {
            const itemWidth = 80; // Ширина элемента в CSS
            const stopPosition = (30 * itemWidth) - (wrapper.offsetWidth / 2) + (itemWidth / 2);
            const randomShift = Math.floor(Math.random() * 30) - 15; // Для естественности остановки
            
            tape.style.transform = `translateX(-${stopPosition + randomShift}px)`;
        }, r * 150);
    }

    // Ждем окончания анимации (4 секунды + задержки)
    setTimeout(() => {
        isRolling = false;
        
        // Показываем выигрыш (замени на свою функцию отображения, например, модальное окно)
        alert(`Вы выбили:\n${winItems.map(item => `• ${item[0]}`).join('\n')}`);
        
        // Твоя функция сохранения выигранных предметов в базу данных
        if (typeof saveWinItemsToDatabase === 'function') {
            saveWinItemsToDatabase(winItems);
        }

        // Возвращаем видимость обычной рулетке
        if (singleRoulette) singleRoulette.style.opacity = "1";
        roulettesWrap.remove(); // Удаляем временные 5 рулеток

        // Разблокируем кнопки
        document.getElementById("open-btn").disabled = false;
        document.getElementById("open-btn-x5").disabled = false;
    }, 4500 + (count * 150));
}

// Вспомогательная функция выбора случайного предмета (если у тебя её нет)
function getRandomItem(items) {
    const totalChance = items.reduce((sum, item) => sum + item[1], 0);
    let random = Math.random() * totalChance;
    for (const item of items) {
        if (random < item[1]) return item;
        random -= item[1];
    }
    return items[0];
}

    window.addEventListener('DOMContentLoaded', loadUserData);
